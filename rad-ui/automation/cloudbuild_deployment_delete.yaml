steps:
- id: 'Prepare Destruction Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🔥 INFRASTRUCTURE DESTRUCTION INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"
    echo "⚠️  WARNING: This will DESTROY all infrastructure!"
    echo "========================================"
    
    # Function to log with timestamp
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🧹 Cleaning workspace..."
    rm -rfv * 2>/dev/null || log "Workspace already clean"
        
    log "🔍 Checking for deployment files..."
    
    # Verify deployment exists before attempting destruction
    if ! gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
        log "❌ ERROR: No deployment archive found!"
        log "   Expected: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
        log "   Cannot proceed with destruction without deployment files."
        exit 1
    fi
    
    log "📦 Deployment found - downloading files..."
    
    # Download all deployment files
    gsutil -m cp -r "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files/*" .
    
    # Extract the module archive
    log "📂 Extracting deployment files..."
    tar -xzf "${_MODULE_NAME}.tar.gz"
    
    # Clean up the archive file
    rm -f "${_MODULE_NAME}.tar.gz"
    
    log "📋 Workspace contents prepared:"
    ls -la /workspace/modules/${_MODULE_NAME} || true
    
    log "✅ Destruction environment prepared"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Initialize and Validate State'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🔧 Initializing Terraform/Tofu for destruction..."
    
    # Initialize with reconfigure to ensure clean state
    tofu init -reconfigure
    
    log "🔍 Validating current state..."
    
    # Check if state file exists and has resources
    if tofu show -json > /dev/null 2>&1; then
        log "📊 Found $(tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null || echo "unknown") resources in state"
        
        # Show what will be destroyed
        log "📋 Planning destruction..."
        tofu plan -destroy -out=destroy.tfplan
        
        log "⚠️  Resources to be destroyed:"
        tofu show -json destroy.tfplan | jq -r '.resource_changes[]? | select(.change.actions[] == "delete") | .address' 2>/dev/null || log "Unable to parse destruction plan"
        
        # Create audit record of resources before destruction
        log "📝 Creating pre-destruction audit record..."
        mkdir -p /workspace/audit
        
        # Capture resource inventory
        tofu show -json > /workspace/audit/pre_destruction_state.json 2>/dev/null || echo "{}" > /workspace/audit/pre_destruction_state.json
        
        # Create human-readable resource list
        tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/pre_destruction_resources.txt || echo "No resources found" > /workspace/audit/pre_destruction_resources.txt
        
        # Upload audit files
        gsutil -m cp /workspace/audit/pre_destruction_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/pre_destruction_state.json" || log "Failed to upload pre-destruction state"
        gsutil -m cp /workspace/audit/pre_destruction_resources.txt "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/pre_destruction_resources.txt" || log "Failed to upload resource list"
        
        log "✅ Pre-destruction audit completed"
    else
        log "⚠️  No state file found or state is empty"
        log "   This may indicate resources were already destroyed"
        
        # Create empty audit record
        mkdir -p /workspace/audit
        echo '{"message": "No state found", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/pre_destruction_state.json
        gsutil cp /workspace/audit/pre_destruction_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/pre_destruction_state.json" || log "Failed to upload empty state"
    fi
    
    log "✅ State validation completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Destroy Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🔥 Starting infrastructure destruction..."
    
    # Create destruction metadata
    mkdir -p /workspace/audit
    cat > /workspace/audit/destruction_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}"
    }
    EOF
    
    # Upload metadata
    gsutil cp /workspace/audit/destruction_metadata.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/destruction_metadata.json" || log "Failed to upload metadata"
    
    # Destroy with retry logic for transient errors
    destroy_with_retry() {
        local max_attempts=3
        local attempt=1
        local final_exit_code=0
        
        while [ $attempt -le $max_attempts ]; do
            log "💥 Destruction attempt $attempt of $max_attempts"
            
            if tofu destroy -auto-approve -input=false; then
                log "✅ Destruction successful on attempt $attempt"
                final_exit_code=0
                break
            else
                final_exit_code=$?
                log "❌ Destruction failed on attempt $attempt (exit code: $final_exit_code)"
                
                if [ $attempt -eq $max_attempts ]; then
                    log "💥 All destruction attempts failed"
                    log "🔍 Checking for remaining resources..."
                    
                    # Try to show what's left
                    if tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10; then
                        log "⚠️  Some resources may still exist in state"
                    fi
                    
                    break
                fi
                
                log "⏳ Waiting 60 seconds before retry..."
                sleep 60
                
                # Refresh state before retry
                log "🔄 Refreshing state before retry..."
                tofu refresh || log "State refresh failed, continuing with retry"
            fi
            
            ((attempt++))
        done
        
        return $final_exit_code
    }
    
    destroy_with_retry
    
    # Capture exit code in a file to pass to next step
    echo $? > /workspace/audit/destruction_exit_code.txt
    
    # Update metadata with completion status
    cat > /workspace/audit/destruction_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "completed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}",
      "exit_code": $(cat /workspace/audit/destruction_exit_code.txt),
      "status": "$([ $(cat /workspace/audit/destruction_exit_code.txt) -eq 0 ] && echo 'success' || echo 'failed')"
    }
    EOF
    
    gsutil cp /workspace/audit/destruction_metadata.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/destruction_metadata.json" || log "Failed to upload final metadata"
    
    log "🎯 Infrastructure destruction completed"
    
    exit $(cat /workspace/audit/destruction_exit_code.txt)
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Verify Destruction and Cleanup'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🔍 Verifying destruction completion..."
    
    mkdir -p /workspace/audit
    
    # Check final state and capture values inline
    if tofu show -json > /dev/null 2>&1; then
        tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null > /workspace/audit/remaining_count.txt || echo "0" > /workspace/audit/remaining_count.txt
        
        if [ "$(cat /workspace/audit/remaining_count.txt)" = "0" ]; then
            log "✅ All resources successfully destroyed"
            echo "success" > /workspace/audit/verification_status.txt
            echo "All resources successfully destroyed" > /workspace/audit/verification_message.txt
        else
            log "⚠️  Warning: $(cat /workspace/audit/remaining_count.txt) resources may still exist"
            log "📋 Remaining resources:"
            tofu show -json | jq -r '.values.root_module.resources[]?.address // empty' 2>/dev/null || log "Unable to list remaining resources"
            echo "partial" > /workspace/audit/verification_status.txt
            echo "$(cat /workspace/audit/remaining_count.txt) resources may still exist in state" > /workspace/audit/verification_message.txt
            
            # Capture remaining resources for audit
            tofu show -json > /workspace/audit/post_destruction_state.json 2>/dev/null || echo "{}" > /workspace/audit/post_destruction_state.json
            tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/remaining_resources.txt || echo "Unable to list" > /workspace/audit/remaining_resources.txt
        fi
    else
        log "✅ State is clean - no resources found"
        echo "success" > /workspace/audit/verification_status.txt
        echo "State is clean - no resources found" > /workspace/audit/verification_message.txt
        echo "0" > /workspace/audit/remaining_count.txt
        echo '{"message": "No state found after destruction", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/post_destruction_state.json
    fi
    
    # Create verification report
    cat > /workspace/audit/destruction_verification.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "verified_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "status": "$(cat /workspace/audit/verification_status.txt)",
      "message": "$(cat /workspace/audit/verification_message.txt)",
      "remaining_resources": $(cat /workspace/audit/remaining_count.txt)
    }
    EOF
    
    # Upload verification report
    gsutil cp /workspace/audit/destruction_verification.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/destruction_verification.json" || log "Failed to upload verification report"
    
    # Upload post-destruction state if it exists
    if [ -f /workspace/audit/post_destruction_state.json ]; then
        gsutil cp /workspace/audit/post_destruction_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/post_destruction_state.json" || log "Failed to upload post-destruction state"
    fi
    
    if [ -f /workspace/audit/remaining_resources.txt ]; then
        gsutil cp /workspace/audit/remaining_resources.txt "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/remaining_resources.txt" || log "Failed to upload remaining resources list"
    fi
    
    log "✅ Destruction verification completed"
    
    # ============================================
    # Create destruction completion marker
    # ============================================
    log "📝 Creating destruction completion marker..."
    
    cat > /workspace/audit/destruction_complete.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "destroyed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "verification_status": "$(cat /workspace/audit/verification_status.txt)",
      "build_logs": "gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destruction/${_MODULE_NAME}/${_DEPLOYMENT_ID}/",
      "audit_files": "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/"
    }
    EOF
    
    gsutil cp /workspace/audit/destruction_complete.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/destruction/destruction_complete.json" || log "Failed to upload completion marker"
    
    # ============================================
    # Clean up deployment folder from GCS
    # ============================================
    log "🗑️  Removing deployment folder from Cloud Storage..."
    
    if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/" > /dev/null 2>&1; then
        log "📁 Found deployment folder: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
        
        # List contents before deletion (for audit)
        log "📋 Contents to be deleted:"
        gsutil du -sh "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/" || log "Unable to calculate size"
        
        # Remove the entire deployment folder
        if gsutil -m rm -r "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/" 2>&1; then
            log "✅ Successfully removed deployment folder from Cloud Storage"
        else
            log "⚠️  Failed to remove deployment folder (may require manual cleanup)"
            log "   Path: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
        fi
        
        # Verify deletion
        if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/" > /dev/null 2>&1; then
            log "❌ Warning: Deployment folder still exists after deletion attempt"
        else
            log "✅ Confirmed: Deployment folder has been removed"
        fi
    else
        log "ℹ️  Deployment folder not found or already removed"
    fi
    
    log "🎉 Complete cleanup finished!"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Destruction Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    echo "========================================="
    log "🔥 INFRASTRUCTURE DESTRUCTION COMPLETED"
    echo "========================================="
    echo "Destruction Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Build ID: ${BUILD_ID}"
    echo "  • Completed: $(date)"
    echo "========================================="
    echo "⚠️ IMPORTANT: Deployment deleted from GCS"
    echo "========================================="
    echo "📝 Audit Trail Preserved:"
    echo "  • Build Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destruction/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================="
    echo "Note: Audit files were uploaded to the deployment"
    echo "folder before deletion. Build logs contain the"
    echo "complete destruction process for compliance."
    echo "========================================="
  dir: /workspace/modules/${_MODULE_NAME}

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true

substitutions:
  _DEPLOYMENT_ID: "none"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destruction/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s  # Keep long timeout for complex infrastructure
