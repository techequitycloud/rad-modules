steps:
- id: 'Prepare Source Code'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  secretEnv: ['GIT_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 TERRAFORM DEPLOYMENT INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"
    
    # Function to log with timestamp
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🧹 Preparing module workspace..."
    
    # ✅ Determine which repository to use
    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_MODULE_GIT_REPO_URL}"
        log "📦 Using module-specific repository: $$REPO_URL"
    elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_GIT_REPO_URL}"
        log "📦 Using default platform repository: $$REPO_URL"
    else
        REPO_URL=""
        log "📁 No repository specified - using existing workspace files"
    fi
    
    # Check if we need to clone from Git
    if [ -n "$$REPO_URL" ]; then
        log "📥 Cloning repository from $$REPO_URL"
        
        # Clean workspace completely
        find /workspace -mindepth 1 -delete 2>/dev/null || true
        
        # Clone repository with error handling
        if ! git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" /workspace; then
            log "❌ Failed to clone repository"
            log "   Repository: $$REPO_URL"
            log "   Please check repository URL and access token"
            exit 1
        fi
        
        log "✅ Repository cloned successfully"
    else
        log "📁 Using existing workspace files"
    fi

    # Save and upload repository metadata for future operations (like destroy)
    # This is done immediately to ensure we have a record even if later steps fail
    if [ -d "/workspace/.git" ]; then
        METADATA_DIR="/workspace/modules/${_MODULE_NAME}"
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"

        # Capture Commit Hash
        git rev-parse HEAD > "$$METADATA_DIR/commit_hash.txt"

        # Capture Repo URL (fallback to git remote if not set via variable)
        if [ -n "$$REPO_URL" ]; then
            echo "$$REPO_URL" > "$$METADATA_DIR/repo_url.txt"
        else
            git config --get remote.origin.url > "$$METADATA_DIR/repo_url.txt" || echo "unknown" > "$$METADATA_DIR/repo_url.txt"
        fi

        log "📝 Saved repository metadata:"
        log "   Commit: $$(cat $$METADATA_DIR/commit_hash.txt)"
        log "   Repo: $$(cat $$METADATA_DIR/repo_url.txt)"

        log "📤 Uploading metadata to GCS immediately..."
        gsutil cp "$$METADATA_DIR/commit_hash.txt" "$$FILES_PATH/" || log "⚠️  Failed to upload commit hash"
        gsutil cp "$$METADATA_DIR/repo_url.txt" "$$FILES_PATH/" || log "⚠️  Failed to upload repo url"
    else
        log "⚠️  Not a git repository, cannot save commit hash"
    fi
    
    # Verify module directory exists
    if [ ! -d "/workspace/modules/${_MODULE_NAME}" ]; then
        log "❌ Module directory not found: /workspace/modules/${_MODULE_NAME}"
        log "📋 Available modules:"
        ls -la /workspace/modules/ 2>/dev/null || log "   No modules directory found"
        log "📋 Workspace contents:"
        ls -la /workspace/ 2>/dev/null || log "   Workspace is empty"
        exit 1
    fi
    
    log "✅ Module directory found: /workspace/modules/${_MODULE_NAME}"
    log "📋 Module contents:"
    ls -la "/workspace/modules/${_MODULE_NAME}/" || true
    
    log "✅ Source code preparation completed"

- id: 'Create Initial Archive and Download Configuration'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "📦 Creating initial deployment archive..."
    
    # Create archive of the module
    tar -hczf "${_MODULE_NAME}.tar.gz" -C "/workspace/modules/${_MODULE_NAME}" .
        
    log "📤 Uploading initial archive to GCS..."
    gsutil -m cp "${_MODULE_NAME}.tar.gz" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"

    # Navigate to module directory for configuration download
    cd "/workspace/modules/${_MODULE_NAME}"
    
    log "⬇️  Downloading deployment configuration..."
    
    # Download terraform.tfvars.json
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/terraform.tfvars.json" ./terraform.tfvars.json; then
        log "✅ Downloaded terraform.tfvars.json"
    else
        log "⚠️  terraform.tfvars.json not found - proceeding without it"
    fi
    
    # Download backend.tf
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf" ./backend.tf; then
        log "✅ Downloaded backend.tf"
    else
        log "⚠️  backend.tf not found - proceeding without it"
    fi
    
    log "📋 Configuration files in module directory:"
    ls -la . || true
    
    log "✅ Archive creation and configuration download completed"
  dir: /workspace

- id: 'Initialize and Plan Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔧 Initializing Terraform/Tofu..."
    
    # Initialize with comprehensive options
    if tofu init -reconfigure -upgrade; then
        log "✅ Terraform initialization successful"
    else
        log "❌ Terraform initialization failed"
        log "🔍 Checking for common issues..."
        
        # Check for backend configuration
        if [ -f "backend.tf" ]; then
            log "📋 Backend configuration found:"
            cat backend.tf
        else
            log "⚠️  No backend.tf found"
        fi
        
        exit 1
    fi
    
    log "📋 Planning infrastructure changes..."
    
    # Generate and review plan
    set +e  # Temporarily disable exit on error
    tofu plan -out=tfplan -detailed-exitcode
    PLAN_EXIT_CODE=$$?
    set -e  # Re-enable exit on error
    
    case $$PLAN_EXIT_CODE in
        0)
            log "ℹ️  No changes required - infrastructure is up to date"
            ;;
        2)
            log "📊 Changes detected - plan generated successfully"
            ;;
        *)
            log "❌ Planning failed with exit code: $$PLAN_EXIT_CODE"
            exit 1
            ;;
    esac
    
    log "✅ Initialization and planning completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Apply Infrastructure Changes'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🚀 Applying infrastructure changes..."
    
    # Apply with retry logic for transient errors
    apply_with_retry() {
        local max_attempts=2
        local attempt=1
        
        while [ $$attempt -le $$max_attempts ]; do
            log "🔄 Apply attempt $$attempt of $$max_attempts"
            
            if tofu apply -auto-approve tfplan; then
                log "✅ Apply successful on attempt $$attempt"
                return 0
            else
                local exit_code=$$?
                log "❌ Apply failed on attempt $$attempt (exit code: $$exit_code)"
                
                if [ $$attempt -eq $$max_attempts ]; then
                    log "💥 All apply attempts failed"
                    
                    # Show current state for debugging
                    log "🔍 Current state summary:"
                    tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || log "Unable to show state"
                    
                    return $$exit_code
                fi
                
                log "⏳ Waiting 30 seconds before retry..."
                sleep 30
                
                # Refresh state before retry
                log "🔄 Refreshing state before retry..."
                tofu refresh || log "State refresh failed, continuing with retry"
            fi
            
            ((attempt++))
        done
    }
    
    apply_with_retry
    
    log "🎯 Infrastructure changes applied successfully"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Refresh State and Generate Outputs'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔄 Refreshing Terraform state..."
    
    # Refresh state to ensure accuracy
    if tofu apply -refresh-only -auto-approve; then
        log "✅ State refresh completed"
    else
        log "⚠️  State refresh failed, but continuing..."
    fi
    
    log "📤 Generating deployment outputs..."
    
    # Generate outputs
    if tofu output -json > output.json; then
        log "✅ Outputs generated successfully"
        
        # Show output summary
        log "📊 Output summary:"
        tofu output 2>/dev/null || log "No outputs defined"
    else
        log "⚠️  Output generation failed, creating empty output file"
        echo "{}" > output.json
    fi
    
    # Upload outputs to GCS
    OUTPUT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output"
    
    if gsutil -m cp output.json "$$OUTPUT_PATH/output.json"; then
        log "✅ Outputs uploaded to GCS"
    else
        log "⚠️  Failed to upload outputs to GCS"
    fi
    
    log "✅ State refresh and output generation completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Create Final Archive and Upload'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "📦 Creating final deployment archive..."
    
    # Create final archive with all state files
    cd /workspace
    tar -hczf "${_MODULE_NAME}.tar.gz" -C "modules/${_MODULE_NAME}" .
    
    log "📤 Uploading final deployment files..."
    
    # Upload final archive
    FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
    gsutil -m cp "${_MODULE_NAME}.tar.gz" "$$FILES_PATH/"
    
    # Create deployment completion marker
    COMPLETION_MARKER="{\"deployed_at\": \"$$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"deployment_id\": \"${_DEPLOYMENT_ID}\", \"module\": \"${_MODULE_NAME}\", \"status\": \"completed\"}"
    echo "$$COMPLETION_MARKER" > deployment_complete.json
    gsutil cp deployment_complete.json "$$FILES_PATH/"
    
    log "📋 Final archive contents:"
    tar -tzf "${_MODULE_NAME}.tar.gz" | head -20
    
    log "✅ Final archive created and uploaded"
  dir: /workspace

- id: 'Deployment Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    # Determine which repo was used
    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
        REPO_USED="${_MODULE_GIT_REPO_URL}"
    elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
        REPO_USED="${_GIT_REPO_URL}"
    else
        REPO_USED="Local/Default"
    fi
    
    echo "========================================"
    log "🎉 TERRAFORM DEPLOYMENT COMPLETED SUCCESSFULLY"
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Repository: $$REPO_USED"
    echo "  • Completed: $$(date)"
    echo "========================================"
    echo "📁 Deployment Artifacts:"
    echo "  • Archive: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
    echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
    echo "  • Completion Marker: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/deployment_complete.json"
    echo "  • Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================"
    
    # Optional: Show final resource summary
    if [[ -f "/workspace/modules/${_MODULE_NAME}/terraform.tfstate" ]]; then
        echo "📊 Deployed Resources Summary:"
        cd /workspace/modules/${_MODULE_NAME}
        tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || echo "Resource summary unavailable"
    fi
    
    echo "========================================"
  dir: /workspace

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
    env: 'GIT_TOKEN'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'  # ✅ Allow empty substitutions
  # machineType: 'E2_HIGHCPU_8'  # Uncomment for more power on complex deployments

substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"

# ============================================
# Logs Configuration
# ============================================
logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}'

# ============================================
# Timeout
# ============================================
timeout: 7200s  # 10 minutes should be enough for bucket cleanup
