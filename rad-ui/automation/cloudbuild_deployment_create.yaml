steps:
- id: 'Acquire Deployment Lock'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔒 Acquiring deployment lock..."
    
    LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
    LOCK_FILE="/tmp/lock.json"
    
    # Create lock file with build info
    cat > $$LOCK_FILE <<EOF
    {
      "build_id": "${BUILD_ID}",
      "operation": "create",
      "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "locked_by": "${_TRIGGERED_BY:-manual}"
    }
    EOF
    
    # Try to create lock (fails if already exists)
    if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>&1; then
        log "✅ Lock acquired successfully"
    else
        log "❌ ERROR: Deployment is locked by another operation"
        log "   Lock path: $$LOCK_PATH"
        
        # Show existing lock info
        if gsutil cat "$$LOCK_PATH" 2>/dev/null; then
            log "   Check if the other operation is still running"
        fi
        
        exit 1
    fi

- id: 'Prepare Deployment Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  secretEnv: ['GIT_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 INFRASTRUCTURE DEPLOYMENT INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $$(date)"
    echo "========================================"
    
    # Function to log with timestamp
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🧹 Cleaning workspace..."
    rm -rfv /workspace/* 2>/dev/null || log "Workspace already clean"
    
    # Create module directory structure
    mkdir -p /workspace/modules/${_MODULE_NAME}
    cd /workspace/modules/${_MODULE_NAME}
    
    log "🔍 Verifying this is a new deployment..."
    
    # Verify deployment doesn't already exist
    if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
        log "❌ ERROR: Deployment already exists!"
        log "   Use cloudbuild-update.yaml to update existing deployments"
        exit 1
    fi
    
    log "✅ Confirmed: New deployment"
    
    # ✅ Determine which repository to use
    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_MODULE_GIT_REPO_URL}"
        log "📦 Using module-specific repository: $$REPO_URL"
    elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_GIT_REPO_URL}"
        log "📦 Using default platform repository: $$REPO_URL"
    else
        log "❌ No repository URL provided"
        exit 1
    fi
    
    log "📥 Cloning repository from $$REPO_URL"
    
    # Clone to temporary directory
    TEMP_CLONE="/tmp/repo_clone"
    rm -rf $$TEMP_CLONE
    
    if ! git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" $$TEMP_CLONE; then
        log "❌ Failed to clone repository"
        log "   Repository: $$REPO_URL"
        exit 1
    fi
    
    log "✅ Repository cloned successfully"
    
    # Copy module files to workspace
    if [ -d "$$TEMP_CLONE/modules/${_MODULE_NAME}" ]; then
        log "📂 Copying module files to workspace..."
        cp -r $$TEMP_CLONE/modules/${_MODULE_NAME}/* .
        log "✅ Module files copied"
    else
        log "❌ Module directory not found: $$TEMP_CLONE/modules/${_MODULE_NAME}"
        log "📋 Available modules:"
        ls -la $$TEMP_CLONE/modules/ || log "No modules directory"
        exit 1
    fi
    
    # Clean up temp clone
    rm -rf $$TEMP_CLONE
    
    # ✅ Download backend.tf FIRST (before it can be overwritten)
    log "⬇️  Downloading backend configuration..."
    
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf" ./backend.tf; then
        log "✅ Downloaded backend.tf"
        
        # Force overwrite any existing backend.tf from Git
        chmod 644 ./backend.tf
        
        log "📄 Backend configuration:"
        cat ./backend.tf
    else
        log "❌ ERROR: backend.tf not found in Cloud Storage"
        log "   Expected: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf"
        exit 1
    fi
    
    # Download terraform.tfvars.json
    log "⬇️  Downloading variable configuration..."
    
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/terraform.tfvars.json" ./terraform.tfvars.json; then
        log "✅ Downloaded terraform.tfvars.json"
        
        log "🔍 Verifying configuration:"
        if cat terraform.tfvars.json | jq '.' > /dev/null 2>&1; then
            log "✅ Valid JSON configuration"
        else
            log "❌ ERROR: Invalid JSON in terraform.tfvars.json"
            exit 1
        fi
    else
        log "❌ ERROR: terraform.tfvars.json not found"
        exit 1
    fi
    
    log "📋 Final workspace contents:"
    ls -la .
    
    log "✅ Deployment environment prepared"
  dir: /workspace

- id: 'Initialize Terraform'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔧 Initializing Terraform/Tofu..."
    
    if tofu init; then
        log "✅ Initialization successful"
    else
        log "❌ Initialization failed"
        exit 1
    fi
    
    log "🔍 Validating configuration..."
    
    if tofu validate; then
        log "✅ Configuration is valid"
    else
        log "❌ Configuration validation failed"
        exit 1
    fi
    
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Plan Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "📋 Creating execution plan..."
    
    if tofu plan -out=tfplan -input=false; then
        log "✅ Plan created successfully"
        
        log "📊 Plan summary:"
        tofu show -no-color tfplan | head -50
    else
        log "❌ Plan creation failed"
        exit 1
    fi
    
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Apply Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🚀 Applying infrastructure changes..."
    
    # Apply with timeout protection
    if timeout 3600 tofu apply -input=false tfplan; then
        log "✅ Infrastructure applied successfully"
    else
        EXIT_CODE=$$?
        if [ $$EXIT_CODE -eq 124 ]; then
            log "❌ Apply timed out after 3600 seconds"
        else
            log "❌ Apply failed with exit code: $$EXIT_CODE"
        fi
        exit $$EXIT_CODE
    fi
    
    log "🎯 Infrastructure deployment completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Generate and Upload Outputs'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "📤 Generating outputs..."
    
    if tofu output -json > output.json; then
        log "✅ Outputs generated successfully"
        
        log "📊 Output summary:"
        tofu output 2>/dev/null || log "No outputs defined"
        
        # Upload outputs to GCS
        if gsutil -m cp output.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"; then
            log "✅ Outputs uploaded to Cloud Storage"
        else
            log "❌ ERROR: Failed to upload outputs"
            exit 1
        fi
    else
        log "⚠️  No outputs defined, creating empty output file"
        echo "{}" > output.json
        gsutil -m cp output.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json" || log "Failed to upload empty outputs"
    fi
    
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Archive and Upload Deployment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "📦 Creating deployment archive..."
    
    cd /workspace
    
    # Create archive excluding unnecessary files
    if tar -czf "${_MODULE_NAME}.tar.gz" \
        --exclude='.terraform' \
        --exclude='.git' \
        --exclude='*.tfstate.backup' \
        --exclude='.terraform.tfstate.lock.info' \
        --exclude='tfplan' \
        -C "modules/${_MODULE_NAME}" .; then
        log "✅ Archive created successfully"
    else
        log "❌ ERROR: Failed to create archive"
        exit 1
    fi
    
    # Verify archive
    ARCHIVE_SIZE=$$(du -h "${_MODULE_NAME}.tar.gz" | cut -f1)
    log "📊 Archive size: $$ARCHIVE_SIZE"
    
    log "📋 Archive contents (first 30 files):"
    tar -tzf "${_MODULE_NAME}.tar.gz" | head -30
    
    log "📤 Uploading deployment archive..."
    
    if gsutil -m cp "${_MODULE_NAME}.tar.gz" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"; then
        log "✅ Archive uploaded successfully"
    else
        log "❌ ERROR: Failed to upload archive"
        exit 1
    fi
    
    # Create deployment completion marker
    log "📝 Creating deployment completion marker..."
    
    cat > /tmp/deployment_complete.json <<EOF
    {
      "deployment_id": "${_DEPLOYMENT_ID}",
      "module": "${_MODULE_NAME}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "created_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "status": "completed",
      "archive_size": "$$ARCHIVE_SIZE"
    }
    EOF
    
    if gsutil cp /tmp/deployment_complete.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/deployment_complete.json"; then
        log "✅ Completion marker uploaded"
    else
        log "⚠️  Failed to upload completion marker (non-critical)"
    fi
    
    log "✅ Deployment archived and uploaded"
  dir: /workspace

- id: 'Release Deployment Lock'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔓 Releasing deployment lock..."
    
    LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
    
    if gsutil rm "$$LOCK_PATH" 2>&1; then
        log "✅ Lock released successfully"
    else
        log "⚠️  Failed to release lock (may require manual cleanup)"
    fi

- id: 'Deployment Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    echo "========================================"
    log "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY"
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Build ID: ${BUILD_ID}"
    echo "  • Completed: $$(date)"
    echo "========================================"
    echo "📁 Deployment Files:"
    echo "  • Archive: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
    echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
    echo "  • Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================"
  dir: /workspace

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
    env: 'GIT_TOKEN'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "techequitycloud/rad-modules"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"
  _TRIGGERED_BY: "manual"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s
