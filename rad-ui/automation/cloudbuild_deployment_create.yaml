steps:
- id: 'Prepare Source Code'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  secretEnv: ['GIT_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    echo "🚀 TERRAFORM DEPLOYMENT INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"

    # Function to log with timestamp
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🧹 Preparing module workspace..."

    # ✅ Determine which repository to use
    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_MODULE_GIT_REPO_URL}"
        log "📦 Using module-specific repository: $$REPO_URL"
    elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
        REPO_URL="${_GIT_REPO_URL}"
        log "📦 Using default platform repository: $$REPO_URL"
    else
        REPO_URL=""
        log "📁 No repository specified - using existing workspace files"
    fi

    # Check if we need to clone from Git
    if [ -n "$$REPO_URL" ]; then
        log "📥 Cloning repository from $$REPO_URL"

        # Clean workspace completely
        find /workspace -mindepth 1 -delete 2>/dev/null || true

        # Clone repository with error handling
        if ! git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" /workspace; then
            log "❌ Failed to clone repository"
            log "   Repository: $$REPO_URL"
            log "   Please check repository URL and access token"
            exit 1
        fi

        log "✅ Repository cloned successfully"

        # Save repository metadata for future operations (like destroy)
        if [ -d "/workspace/.git" ]; then
            git rev-parse HEAD > /workspace/modules/${_MODULE_NAME}/commit_hash.txt
            echo "$$REPO_URL" > /workspace/modules/${_MODULE_NAME}/repo_url.txt
            log "📝 Saved repository metadata:"
            log "   Commit: $$(cat /workspace/modules/${_MODULE_NAME}/commit_hash.txt)"
            log "   Repo: $$(cat /workspace/modules/${_MODULE_NAME}/repo_url.txt)"
        else
            log "⚠️  Not a git repository, cannot save commit hash"
        fi
    else
        log "📁 Using existing workspace files"
    fi

    # Verify module directory exists
    if [ ! -d "/workspace/modules/${_MODULE_NAME}" ]; then
        log "❌ Module directory not found: /workspace/modules/${_MODULE_NAME}"
        log "📋 Available modules:"
        ls -la /workspace/modules/ 2>/dev/null || log "   No modules directory found"
        log "📋 Workspace contents:"
        ls -la /workspace/ 2>/dev/null || log "   Workspace is empty"
        exit 1
    fi

    log "✅ Module directory found: /workspace/modules/${_MODULE_NAME}"
    log "📋 Module contents:"
    ls -la "/workspace/modules/${_MODULE_NAME}/" || true

    log "✅ Source code preparation completed"

- id: 'Create Initial Archive and Download Configuration'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "📦 Creating initial deployment archive..."

    # Create archive of the module
    tar -hczf "${_MODULE_NAME}.tar.gz" -C "/workspace/modules/${_MODULE_NAME}" .

    log "📤 Uploading initial archive to GCS..."
    gsutil -m cp "${_MODULE_NAME}.tar.gz" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"

    # Navigate to module directory for configuration download
    cd "/workspace/modules/${_MODULE_NAME}"

    # Upload repository metadata if available
    if [ -f "commit_hash.txt" ]; then
        gsutil cp "commit_hash.txt" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"
    fi
    if [ -f "repo_url.txt" ]; then
        gsutil cp "repo_url.txt" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"
    fi

    log "⬇️  Downloading deployment configuration..."

    # Download terraform.tfvars.json
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/terraform.tfvars.json" ./terraform.tfvars.json; then
        log "✅ Downloaded terraform.tfvars.json"
    else
        log "⚠️  terraform.tfvars.json not found - proceeding without it"
    fi

    # Download backend.tf
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf" ./backend.tf; then
        log "✅ Downloaded backend.tf"
    else
        log "⚠️  backend.tf not found - proceeding without it"
    fi

    log "📋 Configuration files in module directory:"
    ls -la . || true

    log "✅ Archive creation and configuration download completed"
  dir: /workspace

- id: 'Initialize and Plan Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🔧 Initializing Terraform/Tofu..."

    # Initialize with comprehensive options
    if tofu init -reconfigure -upgrade; then
        log "✅ Terraform initialization successful"
    else
        log "❌ Terraform initialization failed"
        log "🔍 Checking for common issues..."

        # Check for backend configuration
        if [ -f "backend.tf" ]; then
            log "📋 Backend configuration found:"
            cat backend.tf
        else
            log "⚠️  No backend.tf found"
        fi

        exit 1
    fi

    log "📋 Planning infrastructure changes..."

    # Generate and review plan
    set +e  # Temporarily disable exit on error
    tofu plan -out=tfplan -detailed-exitcode
    PLAN_EXIT_CODE=$$?
    set -e  # Re-enable exit on error

    case $$PLAN_EXIT_CODE in
        0)
            log "ℹ️  No changes required - infrastructure is up to date"
            ;;
        2)
            log "📊 Changes detected - plan generated successfully"
            ;;
        *)
            log "❌ Planning failed with exit code: $$PLAN_EXIT_CODE"
            exit 1
            ;;
    esac

    log "✅ Initialization and planning completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Apply Infrastructure Changes'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🚀 Applying infrastructure changes..."

    # Apply with retry logic for transient errors.
    #
    # After each failed attempt we:
    #   1. Sleep (with exponential back-off) to let transient GCP/K8s issues settle.
    #   2. Run `tofu refresh` to bring the state in sync with real-world resources
    #      that may have been partially created during the failed apply.
    #   3. Re-plan against the refreshed state — the old tfplan is now STALE after
    #      a refresh and cannot be re-applied (OpenTofu will error with
    #      "Saved plan is stale"). Generating a fresh plan avoids that error.
    #
    # max_attempts=3 and an initial sleep of 60 s (doubling to 120 s) give enough
    # headroom for GKE Autopilot LoadBalancer IP provisioning (which can take 10+
    # minutes on a brand-new cluster) to complete before the final retry.
    apply_with_retry() {
        local max_attempts=3
        local attempt=1
        local sleep_seconds=60

        while [ $$attempt -le $$max_attempts ]; do
            log "🔄 Apply attempt $$attempt of $$max_attempts"

            set +e
            tofu apply -auto-approve tfplan
            APPLY_EXIT_CODE=$$?
            set -e

            if [ $$APPLY_EXIT_CODE -eq 0 ]; then
                log "✅ Apply succeeded on attempt $$attempt"
                return 0
            fi

            log "❌ Apply failed on attempt $$attempt (exit code: $$APPLY_EXIT_CODE)"

            if [ $$attempt -eq $$max_attempts ]; then
                log "💥 All apply attempts failed"

                # Show current state for debugging
                log "🔍 Current state summary:"
                tofu show -json 2>/dev/null \
                    | jq -r '.values.root_module.resources[]?.address // empty' \
                    | head -10 \
                    || log "Unable to show state"

                return $$APPLY_EXIT_CODE
            fi

            log "⏳ Waiting $${sleep_seconds}s before retry..."
            sleep $$sleep_seconds
            sleep_seconds=$$((sleep_seconds * 2))

            # Bring state in sync with resources created during the failed apply.
            log "🔄 Refreshing state before retry..."
            tofu refresh || log "⚠️  State refresh failed, continuing with retry"

            # The saved tfplan is now stale — generate a fresh one.
            log "🔄 Re-planning with refreshed state..."
            set +e
            tofu plan -out=tfplan -detailed-exitcode
            REPLAN_EXIT_CODE=$$?
            set -e

            if [ $$REPLAN_EXIT_CODE -eq 1 ]; then
                log "❌ Re-plan failed before retry attempt $$((attempt + 1))"
                return 1
            fi

            log "✅ Re-plan complete (exit code: $$REPLAN_EXIT_CODE — 0=no-changes, 2=changes)"

            attempt=$$((attempt + 1))
        done
    }

    apply_with_retry

    log "🎯 Infrastructure changes applied successfully"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Refresh State and Generate Outputs'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🔄 Refreshing Terraform state..."

    # Capture kubernetes_ready before the refresh (for logging purposes).
    # NOTE: On a first-time deployment with an inline GKE cluster, Step 3's apply
    # creates the cluster and immediately updates the Terraform state so that
    # kubernetes_ready = true. By the time we reach this step the output is
    # already "true", meaning the false→true transition happened *inside* Step 3
    # rather than here. We therefore cannot rely on a before/after transition to
    # decide whether a second apply is needed. Instead we always attempt a second
    # plan when kubernetes_ready=true and let the plan exit code tell us whether
    # there is anything left to deploy (exit 2 = changes, exit 0 = no-op).
    #
    # NOTE: jq's '//' alternative operator returns the right-hand side for both
    # null AND false, so '.kubernetes_ready.value // true' would incorrectly
    # return "true" when kubernetes_ready is false. Use an explicit has() check
    # instead so the fallback only fires when the output key is absent (i.e.
    # for non-GKE modules that never declare this output).
    KUBERNETES_READY_BEFORE=$$(tofu output -json 2>/dev/null \
        | jq -r 'if has("kubernetes_ready") then (.kubernetes_ready.value | tostring) else "true" end' 2>/dev/null \
        || echo "true")
    log "📊 kubernetes_ready before refresh: $$KUBERNETES_READY_BEFORE"

    # Refresh state to ensure accuracy
    if tofu apply -refresh-only -auto-approve; then
        log "✅ State refresh completed"
    else
        log "⚠️  State refresh failed, but continuing..."
    fi

    # Capture kubernetes_ready after the refresh
    KUBERNETES_READY_AFTER=$$(tofu output -json 2>/dev/null \
        | jq -r 'if has("kubernetes_ready") then (.kubernetes_ready.value | tostring) else "true" end' 2>/dev/null \
        || echo "true")
    log "📊 kubernetes_ready after refresh: $$KUBERNETES_READY_AFTER"

    # When kubernetes_ready=true, always attempt a second plan+apply.
    #
    # On a fresh deployment of an inline GKE cluster the first apply (Step 3)
    # was planned before the cluster existed (kubernetes_ready=false at plan
    # time), so ALL Kubernetes resources were excluded from that plan. The
    # cluster was created during Step 3, which set kubernetes_ready=true in the
    # state. A second plan now sees kubernetes_ready=true and includes the
    # pending Kubernetes resources (Namespace, SA, Secrets, Jobs, Deployment,
    # Service, HPA, …).
    #
    # On subsequent runs the cluster already exists, the first plan includes
    # all Kubernetes resources, and this second plan returns exit code 0
    # (no changes) — making it a safe no-op.
    #
    # The second apply uses its own retry function with the same stale-plan
    # protection as the first apply: after any failed attempt we refresh state
    # and re-plan before retrying, rather than reusing a stale tfplan-k8s.
    if [ "$$KUBERNETES_READY_AFTER" = "true" ]; then
        log "🔄 kubernetes_ready=true — running second plan to deploy any pending Kubernetes resources..."

        set +e
        tofu plan -out=tfplan-k8s -detailed-exitcode
        PLAN_EXIT_CODE=$$?
        set -e

        case $$PLAN_EXIT_CODE in
            0)
                log "ℹ️  No additional Kubernetes resource changes detected"
                ;;
            2)
                log "📊 Kubernetes resources pending — applying..."

                k8s_apply_with_retry() {
                    local plan_file="tfplan-k8s"
                    local max_attempts=3
                    local attempt=1
                    local sleep_seconds=60

                    while [ $$attempt -le $$max_attempts ]; do
                        log "🔄 K8s apply attempt $$attempt of $$max_attempts"

                        set +e
                        tofu apply -auto-approve $$plan_file
                        K8S_APPLY_EXIT_CODE=$$?
                        set -e

                        if [ $$K8S_APPLY_EXIT_CODE -eq 0 ]; then
                            log "✅ K8s apply succeeded on attempt $$attempt"
                            return 0
                        fi

                        log "❌ K8s apply failed on attempt $$attempt (exit code: $$K8S_APPLY_EXIT_CODE)"

                        if [ $$attempt -eq $$max_attempts ]; then
                            log "💥 All K8s apply attempts failed"
                            return $$K8S_APPLY_EXIT_CODE
                        fi

                        log "⏳ Waiting $${sleep_seconds}s before K8s retry..."
                        sleep $$sleep_seconds
                        sleep_seconds=$$((sleep_seconds * 2))

                        log "🔄 Refreshing state before K8s retry..."
                        tofu refresh || log "⚠️  State refresh failed, continuing with retry"

                        log "🔄 Re-planning K8s resources with refreshed state..."
                        set +e
                        tofu plan -out=$$plan_file -detailed-exitcode
                        K8S_REPLAN_EXIT_CODE=$$?
                        set -e

                        if [ $$K8S_REPLAN_EXIT_CODE -eq 1 ]; then
                            log "❌ K8s re-plan failed before retry attempt $$((attempt + 1))"
                            return 1
                        fi

                        log "✅ K8s re-plan complete (exit code: $$K8S_REPLAN_EXIT_CODE)"

                        attempt=$$((attempt + 1))
                    done
                }

                if k8s_apply_with_retry; then
                    log "✅ Kubernetes resources deployed successfully"
                else
                    log "❌ Second apply failed — Kubernetes resources were not deployed"
                    exit 1
                fi
                ;;
            *)
                log "❌ Re-plan for Kubernetes resources failed (exit code: $$PLAN_EXIT_CODE)"
                exit 1
                ;;
        esac
    else
        log "ℹ️  kubernetes_ready=false — skipping Kubernetes resource deployment (cluster not yet available)"
    fi

    log "📤 Generating deployment outputs..."

    # Generate outputs
    if tofu output -json > output.json; then
        log "✅ Outputs generated successfully"

        # Show output summary
        log "📊 Output summary:"
        tofu output 2>/dev/null || log "No outputs defined"
    else
        log "⚠️  Output generation failed, creating empty output file"
        echo "{}" > output.json
    fi

    # Upload outputs to GCS
    OUTPUT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output"

    if gsutil -m cp output.json "$$OUTPUT_PATH/output.json"; then
        log "✅ Outputs uploaded to GCS"
    else
        log "⚠️  Failed to upload outputs to GCS"
    fi

    log "✅ State refresh and output generation completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Create Final Archive and Upload'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "📦 Creating final deployment archive..."

    # Create final archive with all state files
    cd /workspace
    tar -hczf "${_MODULE_NAME}.tar.gz" -C "modules/${_MODULE_NAME}" .

    log "📤 Uploading final deployment files..."

    # Upload final archive
    FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
    gsutil -m cp "${_MODULE_NAME}.tar.gz" "$$FILES_PATH/"

    # Create deployment completion marker
    COMPLETION_MARKER="{\"deployed_at\": \"$$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"deployment_id\": \"${_DEPLOYMENT_ID}\", \"module\": \"${_MODULE_NAME}\", \"status\": \"completed\"}"
    echo "$$COMPLETION_MARKER" > deployment_complete.json
    gsutil cp deployment_complete.json "$$FILES_PATH/"

    log "📋 Final archive contents:"
    tar -tzf "${_MODULE_NAME}.tar.gz" | head -20

    log "✅ Final archive created and uploaded"
  dir: /workspace

- id: 'Deployment Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    # Determine which repo was used
    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
        REPO_USED="${_MODULE_GIT_REPO_URL}"
    elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
        REPO_USED="${_GIT_REPO_URL}"
    else
        REPO_USED="Local/Default"
    fi

    echo "========================================"
    log "🎉 TERRAFORM DEPLOYMENT COMPLETED SUCCESSFULLY"
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Repository: $$REPO_USED"
    echo "  • Completed: $$(date)"
    echo "========================================"
    echo "📁 Deployment Artifacts:"
    echo "  • Archive: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
    echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
    echo "  • Completion Marker: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/deployment_complete.json"
    echo "  • Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================"

    # Optional: Show final resource summary
    if [[ -f "/workspace/modules/${_MODULE_NAME}/terraform.tfstate" ]]; then
        echo "📊 Deployed Resources Summary:"
        cd /workspace/modules/${_MODULE_NAME}
        tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || echo "Resource summary unavailable"
    fi

    echo "========================================"
  dir: /workspace

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
    env: 'GIT_TOKEN'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'
  # machineType: 'E2_HIGHCPU_8'  # Uncomment for more power on complex deployments

substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s
