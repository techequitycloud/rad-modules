steps:
  # ============================================
  # STEP 0: Validate Prerequisites
  # ============================================
  - id: 'Validate Prerequisites'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔍 VALIDATING PREREQUISITES"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Validating prerequisites..."
        
        # Check required substitution variables
        MISSING_VARS=0
        
        if [ "${_MODULE_NAME}" = "unknown" ] || [ -z "${_MODULE_NAME}" ]; then
            log "❌ ERROR: _MODULE_NAME not set"
            MISSING_VARS=1
        fi
        
        if [ "${_DEPLOYMENT_ID}" = "none" ] || [ -z "${_DEPLOYMENT_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_ID not set"
            MISSING_VARS=1
        fi
        
        if [ -z "${_DEPLOYMENT_BUCKET_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_BUCKET_ID not set"
            MISSING_VARS=1
        fi
        
        if [ $$MISSING_VARS -eq 1 ]; then
            log "❌ ERROR: Required substitution variables missing"
            exit 1
        fi
        
        # ========================================
        # Validate repository configuration
        # ========================================
        log "🔍 Validating repository configuration..."
        
        # Platform repository is REQUIRED for all operations
        if [ -z "${_GIT_REPO_URL}" ] || [ "${_GIT_REPO_URL}" = "none" ] || [ "${_GIT_REPO_URL}" = "" ]; then
            log "❌ ERROR: Platform repository (_GIT_REPO_URL) is REQUIRED"
            log ""
            log "📋 Platform repository is used for:"
            log "   • CloudBuild YAML files"
            log "   • Deployment configurations"
            log "   • Audit logs and backups"
            log "   • Deployment history"
            log ""
            log "💡 Example: _GIT_REPO_URL=your-org/platform-terraform-configs"
            exit 1
        fi
        
        log "✅ Platform repository: ${_GIT_REPO_URL}"
        
        # Partner repository is OPTIONAL (for module code)
        if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
            log "✅ Partner repository: ${_MODULE_GIT_REPO_URL}"
            log "   (Used for module code - read-only access)"
            echo "partner" > /workspace/module_source.txt
        else
            log "ℹ️  No partner repository specified"
            log "   Will use platform repository for module code"
            echo "platform" > /workspace/module_source.txt
        fi
        
        # Verify bucket exists
        log "🔍 Verifying bucket accessibility..."
        if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}" > /dev/null 2>&1; then
            log "✅ Deployment bucket accessible"
        else
            log "❌ ERROR: Cannot access deployment bucket"
            exit 1
        fi
        
        log "✅ Prerequisites validated successfully"

  # ============================================
  # STEP 1: Acquire Deployment Lock
  # ============================================
  - id: 'Acquire Deployment Lock'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔒 ACQUIRING DEPLOYMENT LOCK"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
        LOCK_FILE="/tmp/lock.json"
        
        log "📍 Lock path: $$LOCK_PATH"
        
        # Create lock file with metadata
        cat > $$LOCK_FILE <<EOF
        {
          "build_id": "${BUILD_ID}",
          "operation": "create",
          "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "locked_by": "${_TRIGGERED_BY:-manual}",
          "project_id": "${PROJECT_ID}",
          "module": "${_MODULE_NAME}",
          "deployment_id": "${_DEPLOYMENT_ID}"
        }
        EOF
        
        log "🔒 Attempting to acquire lock..."
        
        MAX_WAIT=300
        WAIT_TIME=0
        ACQUIRED=false
        
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
            if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>/dev/null; then
                log "✅ Lock acquired successfully"
                ACQUIRED=true
                break
            else
                log "⏳ Lock exists, waiting..."
                
                if gsutil cp "$$LOCK_PATH" /tmp/existing_lock.json 2>/dev/null; then
                    EXISTING_BUILD=$$(cat /tmp/existing_lock.json | grep -o '"build_id":"[^"]*"' | cut -d'"' -f4)
                    log "   Locked by build: $$EXISTING_BUILD"
                fi
                
                sleep 10
                WAIT_TIME=$$((WAIT_TIME + 10))
            fi
        done
        
        if [ "$$ACQUIRED" = false ]; then
            log "❌ ERROR: Could not acquire lock after $$MAX_WAIT seconds"
            exit 1
        fi
        
        echo "$$LOCK_PATH" > /workspace/lock_path.txt
        log "💾 Lock path saved"

  # ============================================
  # STEP 2: Prepare Source Code (DUAL REPO SUPPORT)
  # ============================================
  - id: 'Prepare Source Code'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    secretEnv: ['GIT_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🚀 INFRASTRUCTURE DEPLOYMENT INITIATED"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 Preparing module workspace..."
        
        # Verify Git token
        if [ -z "$$GIT_TOKEN" ]; then
            log "❌ ERROR: Git token not available"
            log "   Secret: ${_GITHUB_TOKEN_SECRET_NAME}"
            exit 1
        fi
        
        # Create module directory
        mkdir -p /workspace/modules/${_MODULE_NAME}
        cd /workspace/modules/${_MODULE_NAME}
        
        # Clean workspace
        rm -rf ./* .terraform .terraform.lock.hcl 2>/dev/null || log "Workspace already clean"
        
        # ========================================
        # STEP 2A: Clone MODULE CODE (Partner or Platform)
        # ========================================
        MODULE_SOURCE="platform"
        if [ -f /workspace/module_source.txt ]; then
            MODULE_SOURCE=$$(cat /workspace/module_source.txt)
        fi
        
        if [ "$$MODULE_SOURCE" = "partner" ]; then
            # Use partner repository for module code
            REPO_URL="${_MODULE_GIT_REPO_URL}"
            REPO_TYPE="partner"
            log "📦 Using PARTNER repository for module code"
            log "   Repository: $$REPO_URL"
            log "   Access: Read-only"
        else
            # Use platform repository for module code
            REPO_URL="${_GIT_REPO_URL}"
            REPO_TYPE="platform"
            log "📦 Using PLATFORM repository for module code"
            log "   Repository: $$REPO_URL"
        fi
        
        log "🔄 Cloning module repository..."
        
        if timeout 300 git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" /workspace/module_repo 2>&1; then
            log "✅ Module repository cloned successfully"
            
            # Copy module files
            if [ -d "/workspace/module_repo/modules/${_MODULE_NAME}" ]; then
                cp -r /workspace/module_repo/modules/${_MODULE_NAME}/* . 2>/dev/null || cp -r /workspace/module_repo/modules/${_MODULE_NAME}/. .
                log "✅ Module files copied"
                
                # Verify we have Terraform files
                TF_COUNT=$$(find . -name "*.tf" -type f | wc -l)
                log "📊 Found $$TF_COUNT Terraform files"
                
                if [ $$TF_COUNT -eq 0 ]; then
                    log "❌ ERROR: No Terraform files found in module"
                    exit 1
                fi
            else
                log "❌ ERROR: Module not found in repository"
                log "   Expected: /workspace/module_repo/modules/${_MODULE_NAME}"
                log "   Available modules:"
                ls -la /workspace/module_repo/modules/ 2>/dev/null || log "   No modules directory"
                exit 1
            fi
            
            # Clean up
            rm -rf /workspace/module_repo
        else
            log "❌ ERROR: Failed to clone module repository"
            log "   Repository: $$REPO_URL"
            log "   Type: $$REPO_TYPE"
            log ""
            log "   Possible issues:"
            log "   • Invalid repository URL"
            log "   • Access token expired or lacks permissions"
            log "   • Repository is private"
            log "   • Network timeout"
            exit 1
        fi
        
        # ========================================
        # STEP 2B: Download CONFIGURATION from GCS
        # ========================================
        log "⬇️  Downloading deployment configuration from GCS..."
        
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
        
        # Download terraform.tfvars.json
        if gsutil cp "$$FILES_PATH/terraform.tfvars.json" ./terraform.tfvars.json 2>/dev/null; then
            log "✅ terraform.tfvars.json downloaded"
            
            # Validate JSON
            if command -v jq >/dev/null 2>&1; then
                if jq empty terraform.tfvars.json 2>/dev/null; then
                    VAR_COUNT=$$(jq 'keys | length' terraform.tfvars.json)
                    log "   Variables: $$VAR_COUNT"
                else
                    log "⚠️  terraform.tfvars.json may be invalid JSON"
                fi
            fi
        else
            log "❌ ERROR: terraform.tfvars.json not found"
            log "   Path: $$FILES_PATH/terraform.tfvars.json"
            exit 1
        fi
        
        # Download backend.tf (optional)
        if gsutil cp "$$FILES_PATH/backend.tf" ./backend.tf 2>/dev/null; then
            log "✅ backend.tf downloaded"
        else
            log "ℹ️  backend.tf not found, will create"
        fi
        
        # ========================================
        # Save repository metadata for audit
        # ========================================
        cat > /workspace/repo_metadata.json <<EOF
        {
          "module_source": "$$REPO_TYPE",
          "module_repository": "$$REPO_URL",
          "platform_repository": "${_GIT_REPO_URL}",
          "partner_repository": "${_MODULE_GIT_REPO_URL:-none}",
          "cloned_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
        
        log "✅ Source code preparation completed"
        log "   Module source: $$REPO_TYPE repository"
        log "   Platform repo: ${_GIT_REPO_URL}"
    dir: /workspace

  # ============================================
  # STEP 3: Verify Backend Configuration
  # ============================================
  - id: 'Verify Backend Configuration'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Verifying backend configuration..."
        
        # Check if backend.tf exists
        if [ ! -f backend.tf ]; then
            log "⚠️  backend.tf not found, creating..."
            
            cat > backend.tf <<'EOF'
        terraform {
          backend "gcs" {
            bucket = "${_DEPLOYMENT_BUCKET_ID}"
            prefix = "deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/state"
          }
        }
        EOF
            
            # Substitute variables
            sed -i "s/\${_DEPLOYMENT_BUCKET_ID}/${_DEPLOYMENT_BUCKET_ID}/g" backend.tf
            sed -i "s/\${_MODULE_NAME}/${_MODULE_NAME}/g" backend.tf
            sed -i "s/\${_DEPLOYMENT_ID}/${_DEPLOYMENT_ID}/g" backend.tf
            
            log "✅ backend.tf created"
        fi
        
        log "📄 Backend configuration:"
        cat backend.tf
        
        log "✅ Backend configuration verified"
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 4: Initialize Terraform
  # ============================================
  - id: 'Initialize Terraform'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔧 Initializing Terraform/Tofu..."
        
        # Show version
        tofu version || terraform version || log "Could not determine version"
        
        # Initialize
        if tofu init -no-color 2>&1 | tee /workspace/init_output.txt; then
            log "✅ Initialization successful"
        else
            log "❌ Initialization failed"
            cat /workspace/init_output.txt
            exit 1
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 5: Validate Configuration
  # ============================================
  - id: 'Validate Configuration'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Validating Terraform configuration..."
        
        if tofu validate -no-color 2>&1 | tee /workspace/validate_output.txt; then
            log "✅ Configuration is valid"
        else
            log "❌ Configuration validation failed"
            cat /workspace/validate_output.txt
            exit 1
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 6: Generate Terraform Plan
  # ============================================
  - id: 'Generate Terraform Plan'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📋 Generating Terraform execution plan..."
        
        set +e
        tofu plan -out=tfplan -no-color -detailed-exitcode 2>&1 | tee /workspace/plan_output.txt
        PLAN_EXIT_CODE=$${PIPESTATUS[0]}
        set -e
        
        case $$PLAN_EXIT_CODE in
            0)
                log "ℹ️  No changes detected"
                echo "NO_CHANGES" > /workspace/plan_status.txt
                ;;
            2)
                log "📊 Changes detected"
                echo "HAS_CHANGES" > /workspace/plan_status.txt
                grep -E "Plan:" /workspace/plan_output.txt || log "Could not extract summary"
                ;;
            *)
                log "❌ Planning failed"
                cat /workspace/plan_output.txt
                exit 1
                ;;
        esac
        
        # Save plan
        if tofu show -json tfplan > /workspace/tfplan.json 2>/dev/null; then
            log "✅ Plan saved"
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 7: Apply Infrastructure Changes
  # ============================================
  - id: 'Apply Infrastructure Changes'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        PLAN_STATUS="HAS_CHANGES"
        if [ -f /workspace/plan_status.txt ]; then
            PLAN_STATUS=$$(cat /workspace/plan_status.txt)
        fi
        
        if [ "$$PLAN_STATUS" = "NO_CHANGES" ]; then
            log "ℹ️  No changes to apply"
            echo "skipped" > /workspace/apply_status.txt
            exit 0
        fi
        
        log "🚀 Applying infrastructure changes..."
        
        if tofu apply -auto-approve -no-color tfplan 2>&1 | tee /workspace/apply_output.txt; then
            log "✅ Apply successful"
            echo "success" > /workspace/apply_status.txt
        else
            log "❌ Apply failed"
            cat /workspace/apply_output.txt
            echo "failed" > /workspace/apply_status.txt
            exit 1
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 8: Generate Outputs
  # ============================================
  - id: 'Generate Outputs'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📤 Generating outputs..."
        
        if tofu output -json > output.json 2>/dev/null; then
            log "✅ Outputs generated"
            
            # Upload to GCS
            OUTPUT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output"
            gsutil -h "Content-Type:application/json" cp output.json "$$OUTPUT_PATH/output.json" || log "⚠️  Upload failed"
        else
            log "ℹ️  No outputs defined"
            echo "{}" > output.json
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 9: Archive and Upload Deployment Files
  # ============================================
  - id: 'Archive and Upload Deployment Files'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📦 Creating deployment archive..."
        
        cd /workspace/modules/${_MODULE_NAME}
        
        TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
        ARCHIVE_NAME="${_MODULE_NAME}-final-$$TIMESTAMP.tar.gz"
        
        if tar -czf "/workspace/$$ARCHIVE_NAME" \
            --exclude='.terraform/providers' \
            --exclude='*.tfstate.backup' \
            --exclude='tfplan' \
            --exclude='.git' \
            . 2>/dev/null; then
            log "✅ Archive created"
        fi
        
        ARCHIVE_SIZE=$$(du -h "/workspace/$$ARCHIVE_NAME" | cut -f1)
        log "📊 Archive size: $$ARCHIVE_SIZE"
        
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
        
        # Upload timestamped archive
        if gsutil -h "Content-Type:application/gzip" \
                  cp "/workspace/$$ARCHIVE_NAME" "$$FILES_PATH/$$ARCHIVE_NAME"; then
            log "✅ Timestamped archive uploaded"
        fi
        
        # Upload as latest
        if gsutil cp "/workspace/$$ARCHIVE_NAME" "$$FILES_PATH/${_MODULE_NAME}.tar.gz"; then
            log "✅ Latest archive uploaded"
        fi

  # ============================================
  # STEP 10: Create Deployment Completion Marker
  # ============================================
  - id: 'Create Deployment Completion Marker'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📝 Creating deployment completion marker..."
        
        # Read repository metadata
        MODULE_SOURCE="unknown"
        MODULE_REPO="none"
        PLATFORM_REPO="${_GIT_REPO_URL}"
        PARTNER_REPO="${_MODULE_GIT_REPO_URL:-none}"
        
        if [ -f /workspace/repo_metadata.json ]; then
            if command -v jq >/dev/null 2>&1; then
                MODULE_SOURCE=$$(jq -r '.module_source // "unknown"' /workspace/repo_metadata.json 2>/dev/null || echo "unknown")
                MODULE_REPO=$$(jq -r '.module_repository // "none"' /workspace/repo_metadata.json 2>/dev/null || echo "none")
            fi
        fi
        
        # Get apply status
        APPLY_STATUS="success"
        if [ -f /workspace/apply_status.txt ]; then
            APPLY_STATUS=$$(cat /workspace/apply_status.txt)
        fi
        
        # Create completion marker
        cat > /tmp/deployment_complete.json <<EOF
        {
          "deployed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "deployment_id": "${_DEPLOYMENT_ID}",
          "module": "${_MODULE_NAME}",
          "project_id": "${PROJECT_ID}",
          "build_id": "${BUILD_ID}",
          "operation": "create",
          "status": "$$APPLY_STATUS",
          "repository_type": "$$MODULE_SOURCE",
          "repository_url": "$$MODULE_REPO",
          "platform_repo": "$$PLATFORM_REPO",
          "partner_repo": "$$PARTNER_REPO",
          "triggered_by": "${_TRIGGERED_BY:-manual}"
        }
        EOF
        
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
        
        if gsutil -h "Content-Type:application/json" cp /tmp/deployment_complete.json "$$FILES_PATH/deployment_complete.json"; then
            log "✅ Deployment completion marker created"
        fi

  # ============================================
  # STEP 11: Deployment Summary
  # ============================================
  - id: 'Deployment Summary'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        APPLY_STATUS="success"
        if [ -f /workspace/apply_status.txt ]; then
            APPLY_STATUS=$$(cat /workspace/apply_status.txt)
        fi
        
        echo "========================================"
        if [ "$$APPLY_STATUS" = "success" ]; then
            log "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY"
        else
            log "ℹ️  DEPLOYMENT COMPLETED (NO CHANGES)"
        fi
        echo "========================================"
        echo "Deployment Details:"
        echo "  • Module: ${_MODULE_NAME}"
        echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
        echo "  • Project: ${PROJECT_ID}"
        echo "  • Build ID: ${BUILD_ID}"
        echo "  • Completed: $$(date)"
        echo "========================================"
        echo "Repository Configuration:"
        echo "  • Platform repo: ${_GIT_REPO_URL}"
        
        if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
            echo "  • Partner repo: ${_MODULE_GIT_REPO_URL}"
            echo "  • Module source: Partner repository (read-only)"
        else
            echo "  • Module source: Platform repository"
        fi
        
        echo "========================================"
        echo "📁 Deployment Artifacts:"
        echo "  • State: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/state/"
        echo "  • Files: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"
        echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/"
        echo "========================================"
        
        cd /workspace/modules/${_MODULE_NAME}
        
        if tofu state list > /dev/null 2>&1; then
            RESOURCE_COUNT=$$(tofu state list | wc -l)
            echo "📊 Resources Deployed: $$RESOURCE_COUNT"
            echo ""
            echo "  Resources (first 10):"
            tofu state list | head -10 | sed 's/^/    /'
            
            if [ $$RESOURCE_COUNT -gt 10 ]; then
                echo "    ... and $$((RESOURCE_COUNT - 10)) more"
            fi
        fi
        
        echo "========================================"
        log "✅ Deployment complete"

  # ============================================
  # CLEANUP STEPS
  # ============================================
  
  - id: 'Release Deployment Lock (Cleanup)'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    waitFor: ['-']
    args:
      - '-c'
      - |
        set +e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 CLEANUP: Releasing deployment lock"
        
        if [ -f /workspace/lock_path.txt ]; then
            LOCK_PATH=$$(cat /workspace/lock_path.txt)
            
            if gsutil cp "$$LOCK_PATH" /tmp/lock.json 2>/dev/null; then
                LOCK_BUILD_ID=$$(cat /tmp/lock.json | grep -o '"build_id":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
                
                if [ "$$LOCK_BUILD_ID" = "${BUILD_ID}" ]; then
                    if gsutil rm "$$LOCK_PATH" 2>/dev/null; then
                        log "✅ Lock released"
                    fi
                fi
            fi
        fi
        
        exit 0

# ============================================
# Secret Configuration
# ============================================
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
      env: 'GIT_TOKEN'

# ============================================
# Build Options
# ============================================
options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

# ============================================
# Substitution Variables
# ============================================
substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "none"                    # REQUIRED: Platform repository (read/write)
  _MODULE_GIT_REPO_URL: ""                 # OPTIONAL: Partner repository (read-only)
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"
  _TRIGGERED_BY: "manual"

# ============================================
# Logs Configuration
# ============================================
logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/create/${_MODULE_NAME}/${_DEPLOYMENT_ID}'

# ============================================
# Timeout
# ============================================
timeout: 3600s
