steps:
- id: 'Prepare Deployment Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 DEPLOYMENT UPDATE INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"
    
    # Function to log with timestamp
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🧹 Cleaning module workspace..."
    rm -rfv * 2>/dev/null || log "Module workspace already clean"
    
    # Define paths
    GCS_BASE_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files"
    ARCHIVE_FILE="${_MODULE_NAME}.tar.gz"
    
    log "🔍 Checking deployment type..."
    
    # Check if this is an initial deployment or update
    if gsutil ls "${GCS_BASE_PATH}/${ARCHIVE_FILE}" > /dev/null 2>&1; then
        log "📦 Existing deployment detected - performing update"
        
        # Download all files for update
        log "⬇️  Downloading existing deployment files..."
        gsutil -m cp -r "${GCS_BASE_PATH}/*" .
        
        # Extract the module archive
        log "📂 Extracting module files..."
        tar -xzf "${ARCHIVE_FILE}"
        
        # Clean up the archive file
        rm -f "${ARCHIVE_FILE}"
        
        log "✅ Update environment prepared"
    else
        log "🆕 Initial deployment detected"
        
        # Download only the required config files for initial deployment
        log "⬇️  Downloading configuration files..."
        gsutil cp "${GCS_BASE_PATH}/terraform.tfvars.json" ./terraform.tfvars.json
        gsutil cp "${GCS_BASE_PATH}/backend.tf" ./backend.tf
        
        log "✅ Initial deployment environment prepared"
    fi
    
  dir: ./modules/${_MODULE_NAME}

- id: 'Initialize and Plan'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🔧 Initializing Terraform/Tofu..."
    
    # Check if already initialized
    if [[ ! -d ".terraform" ]]; then
        log "🆕 First time initialization"
        tofu init
    else
        log "🔄 Re-initializing existing state"
        tofu init -upgrade
    fi
    
    log "📋 Generating execution plan..."
    tofu plan -out=tfplan
    
    log "✅ Initialization and planning completed"
  dir: ./modules/${_MODULE_NAME}

- id: 'Apply Infrastructure Changes'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🚀 Applying infrastructure changes..."
    
    # Apply with retry logic for transient errors
    apply_with_retry() {
        local max_attempts=2
        local attempt=1
        
        while [ $attempt -le $max_attempts ]; do
            log "🔄 Apply attempt $attempt of $max_attempts"
            
            if tofu apply -auto-approve tfplan; then
                log "✅ Apply successful on attempt $attempt"
                return 0
            else
                log "❌ Apply failed on attempt $attempt"
                if [ $attempt -eq $max_attempts ]; then
                    log "💥 All apply attempts failed"
                    return 1
                fi
                
                log "⏳ Waiting 30 seconds before retry..."
                sleep 30
                
                # Regenerate plan for retry
                log "🔄 Regenerating plan for retry..."
                tofu plan -out=tfplan
            fi
            
            ((attempt++))
        done
    }
    
    apply_with_retry
    
    log "🎯 Infrastructure changes applied successfully"
  dir: ./modules/${_MODULE_NAME}

- id: 'Refresh State and Generate Outputs'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "🔄 Refreshing Terraform state..."
    tofu apply -refresh-only -auto-approve
    
    log "📤 Generating and uploading outputs..."
    tofu output -json > output.json
    
    # Upload outputs to GCS
    OUTPUT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/output"
    gsutil -m cp output.json "${OUTPUT_PATH}/output.json"
    
    log "📊 Output summary:"
    tofu output || log "No outputs defined"
    
    log "✅ State refresh and output generation completed"
  dir: ./modules/${_MODULE_NAME}

- id: 'Archive and Upload Deployment Files'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    log "📦 Creating deployment archive..."
    
    # Create archive of the module directory
    ARCHIVE_FILE="${_MODULE_NAME}.tar.gz"
    tar -czf "${ARCHIVE_FILE}" -C "modules/${_MODULE_NAME}" .
    
    log "📤 Uploading deployment files..."
    
    # Upload the archive
    FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files"
    gsutil -m cp "${ARCHIVE_FILE}" "${FILES_PATH}/"
    
    # Also backup current tfvars and backend config
    if [[ -f "terraform.tfvars.json" ]]; then
        gsutil cp terraform.tfvars.json "${FILES_PATH}/terraform.tfvars.json"
    fi
    
    if [[ -f "backend.tf" ]]; then
        gsutil cp backend.tf "${FILES_PATH}/backend.tf"
    fi
    
    log "📋 Archive contents:"
    tar -tzf "${ARCHIVE_FILE}" | head -20
    
    log "✅ Deployment files archived and uploaded"
    dir: ./modules

- id: 'Deployment Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $1"
    }
    
    echo "========================================"
    log "🎉 DEPLOYMENT UPDATE COMPLETED SUCCESSFULLY"
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Completed: $(date)"
    echo "========================================"
    echo "📁 Deployment Files:"
    echo "  • Archive: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
    echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/output/output.json"
    echo "  • Logs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/logs/"
    echo "========================================"
    
    # Optional: Show final state summary
    if [[ -f "./modules/${_MODULE_NAME}/terraform.tfstate" ]]; then
        echo "📊 Final State Summary:"
        cd ./modules/${_MODULE_NAME}
        tofu show -json | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || echo "State summary unavailable"
    fi
    
    echo "========================================"
    dir: ./modules

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  # machineType: 'E2_HIGHCPU_8'  # More power for Terraform operations

substitutions:
  _DEPLOYMENT_ID: "none"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/logs'
timeout: 7200s  # Keep the same timeout for complex deployments
