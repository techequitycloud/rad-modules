steps:
- id: 'Prepare Deployment Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  secretEnv: ['GIT_TOKEN']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 DEPLOYMENT UPDATE INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"
    
    # Function to log with timestamp
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🧹 Cleaning workspace..."
    rm -rfv /workspace/* 2>/dev/null || log "Workspace already clean"
    
    # Create module directory structure
    mkdir -p /workspace/modules/${_MODULE_NAME}
    cd /workspace/modules/${_MODULE_NAME}
    
    log "🔍 Checking deployment type..."
    
    # Check if this is an initial deployment or update
    if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
        log "📦 Existing deployment detected - performing update"
        
        # Download the archive
        log "⬇️  Downloading module archive..."
        gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" .
        
        # Extract the module archive
        log "📂 Extracting module files..."
        tar -xzf "${_MODULE_NAME}.tar.gz"
        
        # Clean up archive
        rm -f "${_MODULE_NAME}.tar.gz"
        
        # ✅ Download updated configuration files (overwrites old ones from archive)
        log "⬇️  Downloading updated configuration files..."
        
        if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/terraform.tfvars.json" ./terraform.tfvars.json; then
            log "✅ Downloaded terraform.tfvars.json"
            log "🔍 Verifying configuration:"
            cat terraform.tfvars.json | jq '.' || log "Unable to parse JSON"
        else
            log "⚠️  terraform.tfvars.json not found"
        fi
        
        if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf" ./backend.tf; then
            log "✅ Downloaded backend.tf"
        else
            log "⚠️  backend.tf not found"
        fi
        
        log "✅ Update environment prepared with latest configuration"
    else
        log "🆕 Initial deployment detected - fetching source code"
        
        # ✅ Determine which repository to use
        if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_MODULE_GIT_REPO_URL}"
            log "📦 Using module-specific repository: $$REPO_URL"
        elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_GIT_REPO_URL}"
            log "📦 Using default platform repository: $$REPO_URL"
        else
            log "❌ No repository URL provided"
            exit 1
        fi
        
        log "📥 Cloning repository from $$REPO_URL"
        
        # Clone to temporary directory
        TEMP_CLONE="/tmp/repo_clone"
        rm -rf $$TEMP_CLONE
        
        if ! git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" $$TEMP_CLONE; then
            log "❌ Failed to clone repository"
            log "   Repository: $$REPO_URL"
            exit 1
        fi
        
        log "✅ Repository cloned successfully"
        
        # Copy module files to workspace
        if [ -d "$$TEMP_CLONE/modules/${_MODULE_NAME}" ]; then
            log "📂 Copying module files to workspace..."
            cp -r $$TEMP_CLONE/modules/${_MODULE_NAME}/* .
            log "✅ Module files copied"
        else
            log "❌ Module directory not found: $$TEMP_CLONE/modules/${_MODULE_NAME}"
            log "📋 Available modules:"
            ls -la $$TEMP_CLONE/modules/ || log "No modules directory"
            exit 1
        fi
        
        # Clean up temp clone
        rm -rf $$TEMP_CLONE
        
        # Download configuration files
        log "⬇️  Downloading configuration files..."
        
        if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/terraform.tfvars.json" ./terraform.tfvars.json; then
            log "✅ Downloaded terraform.tfvars.json"
        else
            log "⚠️  terraform.tfvars.json not found"
        fi
        
        if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/backend.tf" ./backend.tf; then
            log "✅ Downloaded backend.tf"
        else
            log "⚠️  backend.tf not found"
        fi
        
        log "✅ Initial deployment environment prepared"
    fi
    
    log "📋 Module contents:"
    ls -la . || true
    
  dir: /workspace

- id: 'Initialize and Plan'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔧 Initializing Terraform/Tofu..."
    
    # Check if already initialized
    if [[ ! -d ".terraform" ]]; then
        log "🆕 First time initialization"
        tofu init
    else
        log "🔄 Re-initializing existing state"
        tofu init -upgrade -reconfigure
    fi
    
    log "📋 Generating execution plan..."
    
    # Generate plan with detailed exit code
    set +e
    tofu plan -out=tfplan -detailed-exitcode
    PLAN_EXIT_CODE=$$?
    set -e
    
    case $$PLAN_EXIT_CODE in
        0)
            log "ℹ️  No changes required - infrastructure is up to date"
            ;;
        2)
            log "📊 Changes detected - plan generated successfully"
            ;;
        *)
            log "❌ Planning failed with exit code: $$PLAN_EXIT_CODE"
            exit 1
            ;;
    esac
    
    log "✅ Initialization and planning completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Apply Infrastructure Changes'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🚀 Applying infrastructure changes..."
    
    # Apply with retry logic for transient errors
    apply_with_retry() {
        local max_attempts=2
        local attempt=1
        
        while [ $$attempt -le $$max_attempts ]; do
            log "🔄 Apply attempt $$attempt of $$max_attempts"
            
            if tofu apply -auto-approve tfplan; then
                log "✅ Apply successful on attempt $$attempt"
                return 0
            else
                local exit_code=$$?
                log "❌ Apply failed on attempt $$attempt (exit code: $$exit_code)"
                
                if [ $$attempt -eq $$max_attempts ]; then
                    log "💥 All apply attempts failed"
                    return $$exit_code
                fi
                
                log "⏳ Waiting 30 seconds before retry..."
                sleep 30
                
                # Regenerate plan for retry
                log "🔄 Regenerating plan for retry..."
                tofu plan -out=tfplan
            fi
            
            ((attempt++))
        done
    }
    
    apply_with_retry
    
    log "🎯 Infrastructure changes applied successfully"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Refresh State and Generate Outputs'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔄 Refreshing Terraform state..."
    
    if tofu apply -refresh-only -auto-approve; then
        log "✅ State refresh completed"
    else
        log "⚠️  State refresh failed, but continuing..."
    fi
    
    log "📤 Generating and uploading outputs..."
    
    if tofu output -json > output.json; then
        log "✅ Outputs generated successfully"
        
        # Upload outputs to GCS
        gsutil -m cp output.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
        
        log "📊 Output summary:"
        tofu output 2>/dev/null || log "No outputs defined"
    else
        log "⚠️  Output generation failed, creating empty output file"
        echo "{}" > output.json
        gsutil -m cp output.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
    fi
    
    log "✅ State refresh and output generation completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Archive and Upload Deployment Files'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    log "📦 Creating deployment archive..."
    
    # Create archive from parent directory to avoid "file changed" error
    cd /workspace
    tar -czf "${_MODULE_NAME}.tar.gz" -C "modules/${_MODULE_NAME}" .
    
    log "📤 Uploading deployment files..."
    
    # Upload the archive
    gsutil -m cp "${_MODULE_NAME}.tar.gz" "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"
    
    # Create deployment completion marker
    COMPLETION_MARKER="{\"updated_at\": \"$$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"deployment_id\": \"${_DEPLOYMENT_ID}\", \"module\": \"${_MODULE_NAME}\", \"status\": \"updated\"}"
    echo "$$COMPLETION_MARKER" > /tmp/deployment_updated.json
    gsutil cp /tmp/deployment_updated.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/deployment_updated.json"
    
    log "📋 Archive contents:"
    tar -tzf "${_MODULE_NAME}.tar.gz" | head -20
    
    log "✅ Deployment files archived and uploaded"
    log "ℹ️  Note: terraform.tfvars.json and backend.tf managed by Cloud Function"
  dir: /workspace

- id: 'Deployment Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }
    
    echo "========================================"
    log "🎉 DEPLOYMENT UPDATE COMPLETED SUCCESSFULLY"
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Completed: $$(date)"
    echo "========================================"
    echo "📁 Deployment Files:"
    echo "  • Archive: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
    echo "  • Outputs: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/output/output.json"
    echo "  • Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/update/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================"
    
    # Optional: Show final state summary
    if [[ -f "/workspace/modules/${_MODULE_NAME}/terraform.tfstate" ]]; then
        echo "📊 Final State Summary:"
        cd /workspace/modules/${_MODULE_NAME}
        tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || echo "State summary unavailable"
    fi
    
    echo "========================================"
  dir: /workspace

# ✅ Dynamic secret configuration
availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
    env: 'GIT_TOKEN'

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'  # ✅ Allow empty substitutions
  # machineType: 'E2_HIGHCPU_8'  # More power for Terraform operations

# ✅ Add default substitutions
substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "techequitycloud/rad-modules"  # Default platform repo
  _MODULE_GIT_REPO_URL: ""  # Empty by default, overridden for partner modules
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"  # Default token for platform modules

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/update/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s
