steps:
- id: 'Prepare Destroy Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  secretEnv: ['GIT_TOKEN']
  args:
  - '-c'
  - |
    set -e

    echo "🔥 INFRASTRUCTURE DESTROY INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $(date)"
    echo "========================================"
    echo "⚠️  WARNING: This will DESTROY all infrastructure!"
    echo "========================================"

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🧹 Preparing environment..."

    mkdir -p /tmp/deployment_files
    cd /tmp/deployment_files

    log "🔍 Checking for deployment files..."

    FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"

    if ! gsutil ls "$$FILES_PATH/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
        log "❌ ERROR: No deployment archive found!"
        log "   Expected: $$FILES_PATH/${_MODULE_NAME}.tar.gz"
        exit 1
    fi

    log "📦 Downloading deployment metadata..."

    gsutil cp "$$FILES_PATH/repo_url.txt" . 2>/dev/null || true
    gsutil cp "$$FILES_PATH/commit_hash.txt" . 2>/dev/null || true

    STORED_REPO_URL=""
    COMMIT_HASH=""
    if [ -f "repo_url.txt" ] && [ -s "repo_url.txt" ]; then
        STORED_REPO_URL=$$(cat repo_url.txt)
        log "ℹ️  Stored repository URL: $$STORED_REPO_URL"
    fi
    if [ -f "commit_hash.txt" ] && [ -s "commit_hash.txt" ]; then
        COMMIT_HASH=$$(cat commit_hash.txt)
        log "ℹ️  Stored commit hash: $$COMMIT_HASH"
    fi

    try_clone() {
        local repo="$$1"
        local use_commit="$$2"
        if [ -z "$$repo" ] || [ "$$repo" = "none" ]; then return 1; fi
        log "📥 Trying to clone: $$repo"
        find /workspace -mindepth 1 -delete 2>/dev/null || true
        if ! git clone "https://$$GIT_TOKEN@github.com/$$repo.git" /workspace 2>&1; then
            log "⚠️  Clone failed for $$repo (token may lack read access)"
            return 1
        fi
        if [ "$$use_commit" = "yes" ] && [ -n "$$COMMIT_HASH" ]; then
            log "🔄 Checking out deployment commit: $$COMMIT_HASH"
            if cd /workspace && git checkout "$$COMMIT_HASH" 2>/dev/null; then
                log "✅ Checked out deployment commit"
            else
                log "⚠️  Commit $$COMMIT_HASH not found in $$repo, using HEAD"
            fi
        fi
        if [ ! -d "/workspace/modules/${_MODULE_NAME}" ]; then
            log "⚠️  Cloned $$repo but module ${_MODULE_NAME} not found — skipping"
            return 1
        fi
        log "✅ Successfully cloned $$repo (module ${_MODULE_NAME} found)"
        return 0
    }

    CLONE_SUCCESS=false

    if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ]; then
        if try_clone "${_MODULE_GIT_REPO_URL}" "yes"; then
            CLONE_SUCCESS=true
        fi
    fi

    if [ "$$CLONE_SUCCESS" != "true" ] && [ -n "$$STORED_REPO_URL" ]; then
        if try_clone "$$STORED_REPO_URL" "yes"; then
            CLONE_SUCCESS=true
        fi
    fi

    if [ "$$CLONE_SUCCESS" != "true" ] && [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "none" ] && [ "${_GIT_REPO_URL}" != "" ]; then
        if try_clone "${_GIT_REPO_URL}" "no"; then
            CLONE_SUCCESS=true
        fi
    fi

    if [ "$$CLONE_SUCCESS" != "true" ]; then
        if try_clone "techequitycloud/rad-modules" "no"; then
            CLONE_SUCCESS=true
        fi
    fi

    if [ "$$CLONE_SUCCESS" != "true" ]; then
        log "❌ All clone attempts failed for module ${_MODULE_NAME}"
        log "   Repos tried (in order):"
        log "     _MODULE_GIT_REPO_URL : ${_MODULE_GIT_REPO_URL:-<not set>}"
        log "     Stored repo_url.txt  : $${STORED_REPO_URL:-<not found in GCS>}"
        log "     _GIT_REPO_URL        : ${_GIT_REPO_URL:-<not set>}"
        log "     Default              : techequitycloud/rad-modules"
        log "   Ensure the 'git-access-token' secret has read access to a repo"
        log "   containing modules/${_MODULE_NAME}/. For partner repos, pass"
        log "   _MODULE_GIT_REPO_URL=<org/repo> when triggering the destroy build."
        exit 1
    fi

    log "📦 Downloading and extracting state files..."
    cd /tmp/deployment_files

    gsutil cp "$$FILES_PATH/${_MODULE_NAME}.tar.gz" .

    mkdir -p /tmp/deployment_files/extracted
    tar -xzf "${_MODULE_NAME}.tar.gz" -C /tmp/deployment_files/extracted

    log "📂 Restoring state configuration to /workspace/modules/${_MODULE_NAME}..."
    cd /tmp/deployment_files/extracted

    TARGET_DIR="/workspace/modules/${_MODULE_NAME}"

    if [ -f "backend.tf" ]; then
        cp backend.tf "$$TARGET_DIR/"
        log "   Restored backend.tf"
    else
        log "⚠️  backend.tf not found in archive - attempting download from GCS..."
        if gsutil cp "$$FILES_PATH/backend.tf" "$$TARGET_DIR/" 2>/dev/null; then
            log "✅ Downloaded backend.tf fallback"
        else
            log "⚠️  backend.tf not found in GCS either"
        fi
    fi

    if [ -f "terraform.tfvars.json" ]; then
        cp terraform.tfvars.json "$$TARGET_DIR/"
        log "   Restored terraform.tfvars.json"
    else
        log "⚠️  terraform.tfvars.json not found in archive - attempting download from GCS..."
        if gsutil cp "$$FILES_PATH/terraform.tfvars.json" "$$TARGET_DIR/" 2>/dev/null; then
            log "✅ Downloaded terraform.tfvars.json fallback"
        else
            log "⚠️  terraform.tfvars.json not found in GCS either"
        fi
    fi

    if [ -d ".terraform" ]; then
        cp -r .terraform "$$TARGET_DIR/"
        log "   Restored .terraform directory"
    fi

    if [ -f "terraform.tfstate" ]; then
        cp terraform.tfstate "$$TARGET_DIR/"
        log "   Restored terraform.tfstate"
    fi

    log "📋 Workspace contents prepared:"
    ls -la "$$TARGET_DIR" || true

    log "✅ Destroy environment prepared"
  dir: /workspace

- id: 'Initialize and Validate State'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🔧 Initializing Terraform/Tofu for destroy..."

    tofu init -reconfigure

    log "🔍 Validating current state..."

    if tofu show -json > /dev/null 2>&1; then
        RESOURCE_COUNT=$$(tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null || echo "unknown")
        log "📊 Found $$RESOURCE_COUNT resources in state"

        log "📋 Planning destroy..."
        tofu plan -destroy -input=false -out=destroy.tfplan

        log "⚠️  Resources to be destroyed:"
        tofu show -json destroy.tfplan | jq -r '.resource_changes[]? | select(.change.actions[] == "delete") | .address' 2>/dev/null || log "Unable to parse destroy plan"

        log "📝 Creating pre-destroy audit record..."
        mkdir -p /workspace/audit

        tofu show -json > /workspace/audit/pre_destroy_state.json 2>/dev/null || echo "{}" > /workspace/audit/pre_destroy_state.json

        tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/pre_destroy_resources.txt || echo "No resources found" > /workspace/audit/pre_destroy_resources.txt

        gsutil -m cp /workspace/audit/pre_destroy_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/pre_destroy_state.json" || log "Failed to upload pre-destroy state"
        gsutil -m cp /workspace/audit/pre_destroy_resources.txt "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/pre_destroy_resources.txt" || log "Failed to upload resource list"

        log "✅ Pre-destroy audit completed"
    else
        log "⚠️  No state file found or state is empty"
        log "   This may indicate resources were already destroyed"

        mkdir -p /workspace/audit
        echo '{"message": "No state found", "timestamp": "'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/pre_destroy_state.json
        gsutil cp /workspace/audit/pre_destroy_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/pre_destroy_state.json" || log "Failed to upload empty state"
    fi

    log "✅ State validation completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Destroy Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🔥 Starting infrastructure destroy..."

    mkdir -p /workspace/audit
    cat > /workspace/audit/destroy_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}"
    }
    EOF

    gsutil cp /workspace/audit/destroy_metadata.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/destroy_metadata.json" || log "Failed to upload metadata"

    destroy_with_retry() {
        local max_attempts=3
        local attempt=1
        local final_exit_code=0

        while [ $$attempt -le $$max_attempts ]; do
            log "💥 Destroy attempt $$attempt of $$max_attempts"

            if tofu destroy -auto-approve -input=false; then
                log "✅ Destroy successful on attempt $$attempt"
                final_exit_code=0
                break
            else
                final_exit_code=$$?
                log "❌ Destroy failed on attempt $$attempt (exit code: $$final_exit_code)"

                if [ $$attempt -eq $$max_attempts ]; then
                    log "💥 All destroy attempts failed"
                    log "🔍 Checking for remaining resources..."
                    tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || log "Unable to list remaining resources"
                    break
                fi

                # GKE bootstrap destroy race condition:
                # When google_container_cluster is deleted before kubernetes_namespace_v1
                # (which can happen in older state without the depends_on fix), the
                # Kubernetes provider loses its API endpoint. check_inline_cluster_exists
                # returns exists=false, so cluster_endpoint="" and the provider defaults
                # to localhost:80. All subsequent destroy attempts for kubernetes_*
                # resources fail with "connection refused".
                # Detect this and remove the stuck resources from state so destroy
                # can complete cleanly on the next attempt.
                REMAINING_K8S=$$(tofu state list 2>/dev/null | grep "^kubernetes_" || true)
                if [ -n "$$REMAINING_K8S" ]; then
                    CLUSTER_IN_STATE=$$(tofu state list 2>/dev/null | grep "^google_container_cluster\." || true)
                    if [ -z "$$CLUSTER_IN_STATE" ]; then
                        log "⚠️  GKE cluster is gone but Kubernetes resources remain in state"
                        log "    The Kubernetes API is unreachable — removing stuck resources from state..."
                        echo "$$REMAINING_K8S" | while IFS= read -r resource; do
                            log "   Removing from state: $$resource"
                            tofu state rm "$$resource" || log "   ⚠️ Could not remove $$resource"
                        done
                        log "✅ Stuck Kubernetes resources removed — retrying destroy immediately"
                        ((attempt++))
                        continue
                    fi
                fi

                log "⏳ Waiting 60 seconds before retry..."
                sleep 60

                log "🔄 Refreshing state before retry..."
                tofu refresh || log "State refresh failed, continuing with retry"
            fi

            ((attempt++))
        done

        return $$final_exit_code
    }

    destroy_with_retry
    DESTROY_EXIT_CODE=$$?

    echo $$DESTROY_EXIT_CODE > /workspace/audit/destroy_exit_code.txt

    DESTROY_STATUS="success"
    if [ $$DESTROY_EXIT_CODE -ne 0 ]; then
        DESTROY_STATUS="failed"
    fi

    cat > /workspace/audit/destroy_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "completed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}",
      "exit_code": $$DESTROY_EXIT_CODE,
      "status": "$$DESTROY_STATUS"
    }
    EOF

    gsutil cp /workspace/audit/destroy_metadata.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/destroy_metadata.json" || log "Failed to upload final metadata"

    log "🎯 Infrastructure destroy completed with exit code: $$DESTROY_EXIT_CODE"

    exit $$DESTROY_EXIT_CODE
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Verify Destroy and Cleanup'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e

    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    log "🔍 Verifying destroy completion..."

    mkdir -p /workspace/audit

    REMAINING_COUNT=0
    VERIFICATION_STATUS="success"
    VERIFICATION_MESSAGE="All resources successfully destroyed"

    if tofu show -json > /dev/null 2>&1; then
        REMAINING_COUNT=$$(tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null || echo "0")

        if [ "$$REMAINING_COUNT" = "0" ]; then
            log "✅ All resources successfully destroyed"
        else
            log "⚠️  Warning: $$REMAINING_COUNT resources may still exist"
            log "📋 Remaining resources:"
            tofu show -json | jq -r '.values.root_module.resources[]?.address // empty' 2>/dev/null || log "Unable to list remaining resources"
            VERIFICATION_STATUS="partial"
            VERIFICATION_MESSAGE="$$REMAINING_COUNT resources may still exist in state"

            tofu show -json > /workspace/audit/post_destroy_state.json 2>/dev/null || echo "{}" > /workspace/audit/post_destroy_state.json
            tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/remaining_resources.txt || echo "Unable to list" > /workspace/audit/remaining_resources.txt
        fi
    else
        log "✅ State is clean - no resources found"
        echo '{"message": "No state found after destroy", "timestamp": "'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/post_destroy_state.json
    fi

    cat > /workspace/audit/destroy_verification.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "verified_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "status": "$$VERIFICATION_STATUS",
      "message": "$$VERIFICATION_MESSAGE",
      "remaining_resources": $$REMAINING_COUNT
    }
    EOF

    gsutil cp /workspace/audit/destroy_verification.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/destroy_verification.json" || log "Failed to upload verification report"

    if [ -f /workspace/audit/post_destroy_state.json ]; then
        gsutil cp /workspace/audit/post_destroy_state.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/post_destroy_state.json" || log "Failed to upload post-destroy state"
    fi

    if [ -f /workspace/audit/remaining_resources.txt ]; then
        gsutil cp /workspace/audit/remaining_resources.txt "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/remaining_resources.txt" || log "Failed to upload remaining resources list"
    fi

    log "✅ Destroy verification completed"

    log "📝 Creating destroy completion marker..."

    cat > /workspace/audit/destroy_complete.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "destroyed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "verification_status": "$$VERIFICATION_STATUS",
      "build_logs": "gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/",
      "audit_files": "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/"
    }
    EOF

    gsutil cp /workspace/audit/destroy_complete.json "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/destroy/destroy_complete.json" || log "Failed to upload completion marker"

    log "🗑️  Removing deployment folder from Cloud Storage..."

    if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/" > /dev/null 2>&1; then
        log "📁 Found deployment folder: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"

        log "📋 Contents to be deleted:"
        gsutil du -sh "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/" || log "Unable to calculate size"

        if gsutil -m rm -r "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/" 2>&1; then
            log "✅ Successfully removed deployment folder from Cloud Storage"
        else
            log "⚠️  Failed to remove deployment folder (may require manual cleanup)"
            log "   Path: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"
        fi

        if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/" > /dev/null 2>&1; then
            log "❌ Warning: Deployment folder still exists after deletion attempt"
        else
            log "✅ Confirmed: Deployment folder has been removed"
        fi
    else
        log "ℹ️  Deployment folder not found or already removed"
    fi

    log "🎉 Complete cleanup finished!"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Destroy Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$(date +'%H:%M:%S')] $$1"
    }

    echo "========================================="
    log "🔥 INFRASTRUCTURE DESTROY COMPLETED"
    echo "========================================="
    echo "Destroy Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Build ID: ${BUILD_ID}"
    echo "  • Completed: $$(date)"
    echo "========================================="
    echo "⚠️ IMPORTANT: Deployment deleted from GCS"
    echo "========================================="
    echo "📝 Audit Trail Preserved:"
    echo "  • Build Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "========================================="
    echo "Note: Audit files were uploaded to the deployment"
    echo "folder before deletion. Build logs contain the"
    echo "complete destroy process for compliance."
    echo "========================================="
  dir: /workspace

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

substitutions:
  _DEPLOYMENT_ID: "none"
  _GIT_REPO_URL: "techequitycloud/rad-modules"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"

availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
    env: 'GIT_TOKEN'

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s
