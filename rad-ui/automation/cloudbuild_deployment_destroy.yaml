steps:
- id: 'Acquire Deployment Lock'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔒 Acquiring deployment lock..."
    
    LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
    LOCK_FILE="/tmp/lock.json"
    
    # Create lock file with build info
    cat > $$LOCK_FILE <<EOF
    {
      "build_id": "${BUILD_ID}",
      "operation": "destroy",
      "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "locked_by": "${_TRIGGERED_BY:-manual}"
    }
    EOF
    
    # Try to create lock (fails if already exists)
    if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>&1; then
        log "✅ Lock acquired successfully"
    else
        log "❌ ERROR: Deployment is locked by another operation"
        log "   Lock path: $$LOCK_PATH"
        
        # Show existing lock info
        if gsutil cat "$$LOCK_PATH" 2>/dev/null; then
            log "   Check if the other operation is still running"
        fi
        
        exit 1
    fi

- id: 'Prepare Destroy Environment'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🔥 INFRASTRUCTURE DESTROY INITIATED"
    echo "========================================"
    echo "Module: ${_MODULE_NAME}"
    echo "Deployment ID: ${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "Timestamp: $$(date)"
    echo "========================================"
    echo "⚠️  WARNING: This will DESTROY all infrastructure!"
    echo "========================================"
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🧹 Cleaning workspace..."
    rm -rfv /workspace/* 2>/dev/null || log "Workspace already clean"
    
    mkdir -p /workspace/modules/${_MODULE_NAME}
    cd /workspace/modules/${_MODULE_NAME}
        
    log "🔍 Checking for deployment files..."
    
    # Verify deployment exists
    if ! gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
        log "❌ ERROR: No deployment archive found!"
        log "   Expected: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz"
        log "   Cannot proceed with destroy without deployment files."
        exit 1
    fi
    
    log "📦 Deployment found - downloading files..."
    
    # Download deployment archive
    if gsutil cp "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/${_MODULE_NAME}.tar.gz" .; then
        log "✅ Archive downloaded"
    else
        log "❌ ERROR: Failed to download archive"
        exit 1
    fi
    
    # Extract the module archive
    log "📂 Extracting deployment files..."
    if tar -xzf "${_MODULE_NAME}.tar.gz"; then
        log "✅ Files extracted"
    else
        log "❌ ERROR: Failed to extract archive"
        exit 1
    fi
    
    rm -f "${_MODULE_NAME}.tar.gz"
    
    log "📋 Workspace contents:"
    ls -la .
    
    log "✅ Destroy environment prepared"
  dir: /workspace

- id: 'Initialize and Validate State'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔧 Initializing Terraform/Tofu for destroy..."
    
    if tofu init -reconfigure; then
        log "✅ Initialization successful"
    else
        log "❌ Initialization failed"
        exit 1
    fi
    
    log "🔍 Validating current state..."
    
    # Create audit directory
    mkdir -p /workspace/audit
    
    # Check if state file exists and has resources
    if tofu show -json > /dev/null 2>&1; then
        RESOURCE_COUNT=$$(tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null || echo "unknown")
        log "📊 Found $$RESOURCE_COUNT resources in state"
        
        # Create pre-destroy audit
        log "📝 Creating pre-destroy audit record..."
        
        tofu show -json > /workspace/audit/pre_destroy_state.json 2>/dev/null || echo "{}" > /workspace/audit/pre_destroy_state.json
        tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/pre_destroy_resources.txt || echo "No resources found" > /workspace/audit/pre_destroy_resources.txt
        
        log "✅ Pre-destroy audit completed"
        log "⚠️  Resources to be destroyed:"
        cat /workspace/audit/pre_destroy_resources.txt
    else
        log "⚠️  No state file found or state is empty"
        echo '{"message": "No state found", "timestamp": "'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/pre_destroy_state.json
    fi
    
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Destroy Infrastructure'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔥 Starting infrastructure destroy..."
    
    # Create destroy metadata
    mkdir -p /workspace/audit
    cat > /workspace/audit/destroy_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}"
    }
    EOF
    
    # Destroy with retry logic
    destroy_with_retry() {
        local max_attempts=3
        local attempt=1
        local final_exit_code=0
        
        while [ $$attempt -le $$max_attempts ]; do
            log "💥 Destroy attempt $$attempt of $$max_attempts"
            
            # Destroy with timeout
            if timeout 3600 tofu destroy -auto-approve -input=false; then
                log "✅ Destroy successful on attempt $$attempt"
                final_exit_code=0
                break
            else
                final_exit_code=$$?
                
                if [ $$final_exit_code -eq 124 ]; then
                    log "❌ Destroy timed out on attempt $$attempt"
                else
                    log "❌ Destroy failed on attempt $$attempt (exit code: $$final_exit_code)"
                fi
                
                if [ $$attempt -eq $$max_attempts ]; then
                    log "💥 All destroy attempts failed"
                    log "🔍 Checking for remaining resources..."
                    tofu show -json 2>/dev/null | jq -r '.values.root_module.resources[]?.address // empty' | head -10 || log "Unable to list remaining resources"
                    break
                fi
                
                log "⏳ Waiting 60 seconds before retry..."
                sleep 60
            fi
            
            ((attempt++))
        done
        
        return $$final_exit_code
    }
    
    destroy_with_retry
    DESTROY_EXIT_CODE=$$?
    
    # Update metadata
    DESTROY_STATUS="success"
    if [ $$DESTROY_EXIT_CODE -ne 0 ]; then
        DESTROY_STATUS="failed"
    fi
    
    cat > /workspace/audit/destroy_metadata.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "started_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "completed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "initiated_by": "${_TRIGGERED_BY:-manual}",
      "bucket": "${_DEPLOYMENT_BUCKET_ID}",
      "exit_code": $$DESTROY_EXIT_CODE,
      "status": "$$DESTROY_STATUS"
    }
    EOF
    
    log "🎯 Infrastructure destroy completed with exit code: $$DESTROY_EXIT_CODE"
    
    exit $$DESTROY_EXIT_CODE
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Verify Destroy'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔍 Verifying destroy completion..."
    
    mkdir -p /workspace/audit
    
    # Check final state
    REMAINING_COUNT=0
    VERIFICATION_STATUS="success"
    VERIFICATION_MESSAGE="All resources successfully destroyed"
    
    if tofu show -json > /dev/null 2>&1; then
        REMAINING_COUNT=$$(tofu show -json | jq -r '.values.root_module.resources // [] | length' 2>/dev/null || echo "0")
        
        if [ "$$REMAINING_COUNT" = "0" ]; then
            log "✅ All resources successfully destroyed"
        else
            log "⚠️  Warning: $$REMAINING_COUNT resources may still exist"
            VERIFICATION_STATUS="partial"
            VERIFICATION_MESSAGE="$$REMAINING_COUNT resources may still exist in state"
            
            tofu show -json > /workspace/audit/post_destroy_state.json 2>/dev/null || echo "{}" > /workspace/audit/post_destroy_state.json
            tofu show -json | jq -r '.values.root_module.resources[]? | "\(.type).\(.name) (\(.address))"' 2>/dev/null > /workspace/audit/remaining_resources.txt || echo "Unable to list" > /workspace/audit/remaining_resources.txt
        fi
    else
        log "✅ State is clean - no resources found"
        echo '{"message": "No state found after destroy", "timestamp": "'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > /workspace/audit/post_destroy_state.json
    fi
    
    # Create verification report
    cat > /workspace/audit/destroy_verification.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "verified_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "status": "$$VERIFICATION_STATUS",
      "message": "$$VERIFICATION_MESSAGE",
      "remaining_resources": $$REMAINING_COUNT
    }
    EOF
    
    log "✅ Destroy verification completed"
    
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Upload Audit Files to Separate Location'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "📤 Uploading audit files to permanent location..."
    
    # Upload to build-logs instead of deployment folder (which will be deleted)
    AUDIT_BASE="gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit"
    
    if [ -d /workspace/audit ]; then
        for file in /workspace/audit/*; do
            if [ -f "$$file" ]; then
                FILENAME=$$(basename $$file)
                if gsutil cp "$$file" "$$AUDIT_BASE/$$FILENAME"; then
                    log "✅ Uploaded $$FILENAME"
                else
                    log "⚠️  Failed to upload $$FILENAME"
                fi
            fi
        done
    fi
    
    # Create destroy completion marker
    log "📝 Creating destroy completion marker..."
    
    cat > /tmp/destroy_complete.json <<EOF
    {
      "module": "${_MODULE_NAME}",
      "deployment_id": "${_DEPLOYMENT_ID}",
      "project_id": "${PROJECT_ID}",
      "build_id": "${BUILD_ID}",
      "destroyed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "audit_location": "$$AUDIT_BASE/"
    }
    EOF
    
    if gsutil cp /tmp/destroy_complete.json "$$AUDIT_BASE/destroy_complete.json"; then
        log "✅ Completion marker uploaded"
    else
        log "⚠️  Failed to upload completion marker"
    fi
    
    log "✅ All audit files uploaded to: $$AUDIT_BASE/"

- id: 'Cleanup Deployment Folder'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🗑️  Removing deployment folder from Cloud Storage..."
    
    DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    
    if gsutil ls "$$DEPLOYMENT_PATH" > /dev/null 2>&1; then
        log "📁 Found deployment folder: $$DEPLOYMENT_PATH"
        
        # Calculate size before deletion
        FOLDER_SIZE=$$(gsutil du -sh "$$DEPLOYMENT_PATH" 2>/dev/null | awk '{print $$1 " " $$2}' || echo "unknown")
        log "📊 Folder size: $$FOLDER_SIZE"
        
        # Remove with retry
        MAX_RETRIES=3
        RETRY_COUNT=0
        SUCCESS=false
        
        while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
            if gsutil -m rm -r "$$DEPLOYMENT_PATH" 2>&1; then
                SUCCESS=true
                break
            else
                RETRY_COUNT=$$((RETRY_COUNT + 1))
                if [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; then
                    log "⚠️  Retry $$RETRY_COUNT/$$MAX_RETRIES after 5 seconds..."
                    sleep 5
                fi
            fi
        done
        
        if [ "$$SUCCESS" = true ]; then
            log "✅ Successfully removed deployment folder"
            
            # Verify deletion
            if gsutil ls "$$DEPLOYMENT_PATH" > /dev/null 2>&1; then
                log "❌ ERROR: Deployment folder still exists after deletion"
                exit 1
            else
                log "✅ Confirmed: Deployment folder removed"
            fi
        else
            log "❌ ERROR: Failed to remove deployment folder after $$MAX_RETRIES attempts"
            exit 1
        fi
    else
        log "ℹ️  Deployment folder not found (may already be removed)"
    fi

- id: 'Release Deployment Lock'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    log "🔓 Releasing deployment lock..."
    
    LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
    
    # Lock will be deleted with deployment folder, but try to remove explicitly
    if gsutil rm "$$LOCK_PATH" 2>&1; then
        log "✅ Lock released successfully"
    else
        log "ℹ️  Lock already removed (expected if deployment folder deleted)"
    fi

- id: 'Destroy Summary'
  name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    log() {
        echo "[$$(date +'%H:%M:%S')] $$1"
    }
    
    echo "========================================="
    log "🔥 INFRASTRUCTURE DESTROY COMPLETED"
    echo "========================================="
    echo "Destroy Details:"
    echo "  • Module: ${_MODULE_NAME}"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • Build ID: ${BUILD_ID}"
    echo "  • Completed: $$(date)"
    echo "========================================="
    echo "⚠️  IMPORTANT: Deployment deleted from GCS"
    echo "========================================="
    echo "📝 Audit Trail Preserved:"
    echo "  • Build Logs: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
    echo "  • Audit Files: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit/"
    echo "========================================="
  dir: /workspace

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "techequitycloud/rad-modules"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"
  _TRIGGERED_BY: "manual"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}'
timeout: 7200s
