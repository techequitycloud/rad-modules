steps:
  # ============================================
  # STEP 0: Validate Destroy Prerequisites
  # ============================================
  - id: 'Validate Destroy Prerequisites'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔍 VALIDATING DESTROY PREREQUISITES"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Validating destroy prerequisites..."
        
        # Check required substitution variables
        MISSING_VARS=0
        
        if [ "${_MODULE_NAME}" = "unknown" ] || [ -z "${_MODULE_NAME}" ]; then
            log "❌ ERROR: _MODULE_NAME not set"
            MISSING_VARS=1
        fi
        
        if [ "${_DEPLOYMENT_ID}" = "none" ] || [ -z "${_DEPLOYMENT_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_ID not set"
            MISSING_VARS=1
        fi
        
        if [ -z "${_DEPLOYMENT_BUCKET_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_BUCKET_ID not set"
            MISSING_VARS=1
        fi
        
        if [ $$MISSING_VARS -eq 1 ]; then
            log "❌ ERROR: Required substitution variables missing"
            exit 1
        fi
        
        # Verify bucket exists
        log "🔍 Verifying bucket accessibility..."
        if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}" > /dev/null 2>&1; then
            log "✅ Deployment bucket accessible"
        else
            log "❌ ERROR: Cannot access deployment bucket"
            exit 1
        fi
        
        # Check if deployment exists
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"
        
        log "🔍 Checking deployment existence..."
        if gsutil ls "$$DEPLOYMENT_PATH/" > /dev/null 2>&1; then
            log "✅ Deployment found"
            echo "exists" > /workspace/deployment_exists.txt
            
            # Check for archives
            ARCHIVE_FOUND=false
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
                log "✅ Standard archive found"
                ARCHIVE_FOUND=true
            fi
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}-final-*.tar.gz" > /dev/null 2>&1; then
                log "✅ Final archives found"
                ARCHIVE_FOUND=true
            fi
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}-initial*.tar.gz" > /dev/null 2>&1; then
                log "✅ Initial archives found"
                ARCHIVE_FOUND=true
            fi
            
            if [ "$$ARCHIVE_FOUND" = true ]; then
                echo "archive_exists" > /workspace/archive_status.txt
            else
                log "⚠️  No archives found - will try repository fallback"
                echo "archive_missing" > /workspace/archive_status.txt
            fi
            
            # Extract repository info
            if gsutil cat "$$DEPLOYMENT_PATH/files/deployment_complete.json" > /tmp/deployment_info.json 2>/dev/null; then
                if command -v jq >/dev/null 2>&1 || apk add --no-cache jq 2>/dev/null; then
                    jq -r '.repository_type // "unknown"' /tmp/deployment_info.json > /workspace/original_repo_type.txt 2>/dev/null || echo "unknown" > /workspace/original_repo_type.txt
                    jq -r '.repository_url // "none"' /tmp/deployment_info.json > /workspace/original_repo_url.txt 2>/dev/null || echo "none" > /workspace/original_repo_url.txt
                    jq -r '.partner_repo // "none"' /tmp/deployment_info.json > /workspace/original_partner_repo.txt 2>/dev/null || echo "none" > /workspace/original_partner_repo.txt
                    jq -r '.platform_repo // "none"' /tmp/deployment_info.json > /workspace/original_platform_repo.txt 2>/dev/null || echo "none" > /workspace/original_platform_repo.txt
                fi
            fi
        else
            log "⚠️  Deployment not found"
            echo "not_exists" > /workspace/deployment_exists.txt
            exit 1
        fi
        
        log "✅ Prerequisites validated"

  # ============================================
  # STEP 1: Acquire Destroy Lock
  # ============================================
  - id: 'Acquire Destroy Lock'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔒 ACQUIRING DESTROY LOCK"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
        LOCK_FILE="/tmp/lock.json"
        
        cat > $$LOCK_FILE <<EOF
        {
          "build_id": "${BUILD_ID}",
          "operation": "destroy",
          "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "locked_by": "${_TRIGGERED_BY:-manual}",
          "project_id": "${PROJECT_ID}",
          "module": "${_MODULE_NAME}",
          "deployment_id": "${_DEPLOYMENT_ID}"
        }
        EOF
        
        MAX_WAIT=300
        WAIT_TIME=0
        ACQUIRED=false
        
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
            if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>/dev/null; then
                log "✅ Lock acquired"
                ACQUIRED=true
                break
            else
                log "⏳ Lock exists, waiting..."
                sleep 10
                WAIT_TIME=$$((WAIT_TIME + 10))
            fi
        done
        
        if [ "$$ACQUIRED" = false ]; then
            log "❌ ERROR: Could not acquire lock"
            exit 1
        fi
        
        echo "$$LOCK_PATH" > /workspace/lock_path.txt

  # ============================================
  # STEP 2A: Download from GCS
  # ============================================
  - id: 'Download Deployment Files from GCS'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📦 Downloading deployment files from GCS..."
        
        mkdir -p /workspace/modules/${_MODULE_NAME}
        cd /workspace/modules/${_MODULE_NAME}
        
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
        
        ARCHIVE_DOWNLOADED=false
        
        # Try standard archive
        if gsutil cp "$$FILES_PATH/${_MODULE_NAME}.tar.gz" ./${_MODULE_NAME}.tar.gz 2>/dev/null; then
            log "✅ Downloaded standard archive"
            ARCHIVE_DOWNLOADED=true
            echo "${_MODULE_NAME}.tar.gz" > /workspace/archive_file.txt
            echo "gcs" > /workspace/archive_source.txt
        fi
        
        # Try timestamped final archives
        if [ "$$ARCHIVE_DOWNLOADED" = false ]; then
            LATEST_FINAL=$$(gsutil ls "$$FILES_PATH/${_MODULE_NAME}-final-*.tar.gz" 2>/dev/null | sort -r | head -n 1 || echo "")
            
            if [ -n "$$LATEST_FINAL" ]; then
                ARCHIVE_NAME=$$(basename "$$LATEST_FINAL")
                if gsutil cp "$$LATEST_FINAL" ./$$ARCHIVE_NAME 2>/dev/null; then
                    log "✅ Downloaded final archive"
                    ARCHIVE_DOWNLOADED=true
                    echo "$$ARCHIVE_NAME" > /workspace/archive_file.txt
                    echo "gcs" > /workspace/archive_source.txt
                fi
            fi
        fi
        
        # Try initial archives
        if [ "$$ARCHIVE_DOWNLOADED" = false ]; then
            LATEST_INITIAL=$$(gsutil ls "$$FILES_PATH/${_MODULE_NAME}-initial*.tar.gz" 2>/dev/null | sort -r | head -n 1 || echo "")
            
            if [ -n "$$LATEST_INITIAL" ]; then
                ARCHIVE_NAME=$$(basename "$$LATEST_INITIAL")
                if gsutil cp "$$LATEST_INITIAL" ./$$ARCHIVE_NAME 2>/dev/null; then
                    log "✅ Downloaded initial archive"
                    ARCHIVE_DOWNLOADED=true
                    echo "$$ARCHIVE_NAME" > /workspace/archive_file.txt
                    echo "gcs" > /workspace/archive_source.txt
                fi
            fi
        fi
        
        if [ "$$ARCHIVE_DOWNLOADED" = true ]; then
            echo "success" > /workspace/gcs_download_status.txt
            log "✅ GCS download successful"
        else
            echo "failed" > /workspace/gcs_download_status.txt
            log "⚠️  GCS download failed - will try repository fallback"
        fi

  # ============================================
  # STEP 2B: Repository Fallback (if GCS failed)
  # ============================================
  - id: 'Repository Fallback'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    secretEnv: ['GIT_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        # Check if GCS download succeeded
        GCS_STATUS="failed"
        if [ -f /workspace/gcs_download_status.txt ]; then
            GCS_STATUS=$$(cat /workspace/gcs_download_status.txt)
        fi
        
        if [ "$$GCS_STATUS" = "success" ]; then
            log "ℹ️  GCS download succeeded - skipping repository fallback"
            exit 0
        fi
        
        log "🔄 Attempting repository fallback..."
        
        cd /workspace/modules/${_MODULE_NAME}
        
        # Determine repository to use
        REPO_URL=""
        REPO_TYPE="none"
        
        if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_MODULE_GIT_REPO_URL}"
            REPO_TYPE="partner"
        elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_GIT_REPO_URL}"
            REPO_TYPE="platform"
        elif [ -f /workspace/original_repo_url.txt ]; then
            ORIG_URL=$$(cat /workspace/original_repo_url.txt)
            if [ "$$ORIG_URL" != "none" ] && [ -n "$$ORIG_URL" ]; then
                REPO_URL="$$ORIG_URL"
                REPO_TYPE=$$(cat /workspace/original_repo_type.txt 2>/dev/null || echo "unknown")
            fi
        fi
        
        if [ -z "$$REPO_URL" ] || [ "$$REPO_URL" = "none" ]; then
            log "❌ ERROR: No repository configured for fallback"
            exit 1
        fi
        
        if [ -z "$$GIT_TOKEN" ]; then
            log "❌ ERROR: Git token not available"
            exit 1
        fi
        
        log "📥 Cloning from $$REPO_TYPE repository: $$REPO_URL"
        
        if timeout 300 git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" /tmp/repo 2>&1; then
            log "✅ Repository cloned"
            
            if [ -d "/tmp/repo/modules/${_MODULE_NAME}" ]; then
                cp -r /tmp/repo/modules/${_MODULE_NAME}/* . 2>/dev/null || cp -r /tmp/repo/modules/${_MODULE_NAME}/. .
                log "✅ Module files copied"
                echo "repository" > /workspace/archive_source.txt
                echo "from-repo" > /workspace/archive_file.txt
            else
                log "❌ ERROR: Module not found in repository"
                exit 1
            fi
            
            rm -rf /tmp/repo
        else
            log "❌ ERROR: Failed to clone repository"
            exit 1
        fi

  # ============================================
  # STEP 2C: Extract and Verify Files
  # ============================================
  - id: 'Extract and Verify Files'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📂 Extracting and verifying files..."
        
        cd /workspace/modules/${_MODULE_NAME}
        
        # Check archive source
        ARCHIVE_SOURCE="gcs"
        if [ -f /workspace/archive_source.txt ]; then
            ARCHIVE_SOURCE=$$(cat /workspace/archive_source.txt)
        fi
        
        # Extract if from GCS
        if [ "$$ARCHIVE_SOURCE" = "gcs" ]; then
            ARCHIVE_FILE=$$(cat /workspace/archive_file.txt 2>/dev/null || echo "")
            
            if [ -f "$$ARCHIVE_FILE" ]; then
                log "🔍 Verifying archive: $$ARCHIVE_FILE"
                
                if tar -tzf "$$ARCHIVE_FILE" > /dev/null 2>&1; then
                    log "✅ Archive is valid"
                    
                    if tar -xzf "$$ARCHIVE_FILE" 2>&1; then
                        log "✅ Files extracted"
                        rm -f "$$ARCHIVE_FILE"
                    else
                        log "❌ ERROR: Extraction failed"
                        exit 1
                    fi
                else
                    log "❌ ERROR: Archive is corrupted"
                    exit 1
                fi
            fi
        else
            log "ℹ️  Using files from repository - no extraction needed"
        fi
        
        # Verify critical files
        log "🔍 Verifying critical files..."
        
        if [ ! -f "backend.tf" ]; then
            log "❌ ERROR: backend.tf not found"
            exit 1
        fi
        
        TF_COUNT=$$(find . -maxdepth 1 -name "*.tf" -type f | wc -l)
        log "📊 Found $$TF_COUNT Terraform files"
        
        if [ $$TF_COUNT -eq 0 ]; then
            log "❌ ERROR: No Terraform files found"
            exit 1
        fi
        
        log "✅ Files verified successfully"

  # ============================================
  # STEP 3: Initialize and Validate State
  # ============================================
  - id: 'Initialize and Validate State'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔧 Initializing Terraform/Tofu..."
        
        tofu version || terraform version
        
        if tofu init -reconfigure -no-color 2>&1 | tee /workspace/init_output.txt; then
            log "✅ Initialization successful"
        else
            log "❌ Initialization failed"
            exit 1
        fi
        
        log "🔍 Validating state..."
        
        mkdir -p /workspace/audit
        
        if tofu show -json > /tmp/current_state.json 2>&1; then
            if command -v jq >/dev/null 2>&1; then
                RESOURCE_COUNT=$$(jq -r '.values.root_module.resources // [] | length' /tmp/current_state.json 2>/dev/null || echo "0")
            else
                RESOURCE_COUNT=$$(tofu state list 2>/dev/null | wc -l || echo "0")
            fi
            
            log "📊 Found $$RESOURCE_COUNT resources"
            
            if [ $$RESOURCE_COUNT -eq 0 ]; then
                echo "empty" > /workspace/state_status.txt
            else
                echo "has_resources" > /workspace/state_status.txt
                echo "$$RESOURCE_COUNT" > /workspace/resource_count.txt
                
                tofu state list > /workspace/audit/pre_destroy_resources.txt 2>/dev/null
                
                log "⚠️  Resources to be DESTROYED:"
                cat /workspace/audit/pre_destroy_resources.txt | head -20 | sed 's/^/   • /'
            fi
        else
            log "⚠️  No state found"
            echo "no_state" > /workspace/state_status.txt
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 4: Create Pre-Destroy Backup
  # ============================================
  - id: 'Create Pre-Destroy Backup'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "💾 Creating pre-destroy backup..."
        
        STATE_STATUS="no_state"
        if [ -f /workspace/state_status.txt ]; then
            STATE_STATUS=$$(cat /workspace/state_status.txt)
        fi
        
        if [ "$$STATE_STATUS" = "no_state" ] || [ "$$STATE_STATUS" = "empty" ]; then
            log "ℹ️  No state to backup"
            echo "skipped" > /workspace/backup_status.txt
            exit 0
        fi
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"
        TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
        BACKUP_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/backups/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}-$$TIMESTAMP"
        
        log "📦 Creating backup..."
        
        if gsutil -m cp -r "$$DEPLOYMENT_PATH" "$$BACKUP_PATH/" 2>&1; then
            log "✅ Backup created"
            echo "success" > /workspace/backup_status.txt
            echo "$$BACKUP_PATH/" > /workspace/backup_location.txt
        else
            log "⚠️  Backup failed"
            echo "failed" > /workspace/backup_status.txt
        fi

  # ============================================
  # STEP 5: Destroy Infrastructure
  # ============================================
  - id: 'Destroy Infrastructure'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        STATE_STATUS="no_state"
        if [ -f /workspace/state_status.txt ]; then
            STATE_STATUS=$$(cat /workspace/state_status.txt)
        fi
        
        if [ "$$STATE_STATUS" = "no_state" ] || [ "$$STATE_STATUS" = "empty" ]; then
            log "ℹ️  No resources to destroy"
            echo "skipped" > /workspace/destroy_status.txt
            exit 0
        fi
        
        log "🔥 Destroying infrastructure..."
        
        if tofu destroy -auto-approve -no-color 2>&1 | tee /workspace/destroy_output.txt; then
            log "✅ Destroy successful"
            echo "success" > /workspace/destroy_status.txt
        else
            log "❌ Destroy failed"
            echo "failed" > /workspace/destroy_status.txt
            exit 1
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 6: Verify Destroy
  # ============================================
  - id: 'Verify Destroy'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Verifying destroy..."
        
        REMAINING=$$(tofu state list 2>/dev/null | wc -l || echo "0")
        
        if [ $$REMAINING -eq 0 ]; then
            log "✅ All resources destroyed"
            echo "complete" > /workspace/destroy_verification.txt
        else
            log "⚠️  WARNING: $$REMAINING resources remain"
            tofu state list | sed 's/^/   • /'
            echo "incomplete" > /workspace/destroy_verification.txt
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 7: Upload Audit Files
  # ============================================
  - id: 'Upload Audit Files'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📤 Uploading audit files..."
        
        AUDIT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit"
        
        if [ -d /workspace/audit ]; then
            for file in /workspace/audit/*; do
                if [ -f "$$file" ]; then
                    gsutil cp "$$file" "$$AUDIT_PATH/$$(basename $$file)" 2>/dev/null || true
                fi
            done
        fi
        
        # Create completion marker
        cat > /tmp/destroy_complete.json <<EOF
        {
          "destroyed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "deployment_id": "${_DEPLOYMENT_ID}",
          "module": "${_MODULE_NAME}",
          "project_id": "${PROJECT_ID}",
          "build_id": "${BUILD_ID}",
          "operation": "destroy"
        }
        EOF
        
        gsutil cp /tmp/destroy_complete.json "$$AUDIT_PATH/destroy_complete.json" 2>/dev/null || true
        
        log "✅ Audit files uploaded"

  # ============================================
  # STEP 8: Cleanup Deployment Folder
  # ============================================
  - id: 'Cleanup Deployment Folder'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set +e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 Cleaning up deployment folder..."
        
        DESTROY_STATUS="failed"
        if [ -f /workspace/destroy_status.txt ]; then
            DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        fi
        
        if [ "$$DESTROY_STATUS" != "success" ] && [ "$$DESTROY_STATUS" != "skipped" ]; then
            log "⚠️  Skipping cleanup - destroy did not complete successfully"
            exit 0
        fi
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
        
        log "🗑️  Removing: $$DEPLOYMENT_PATH"
        
        if gsutil -m rm -r "$$DEPLOYMENT_PATH" 2>&1; then
            log "✅ Deployment folder removed"
        else
            log "⚠️  Failed to remove deployment folder"
        fi

  # ============================================
  # STEP 9: Destroy Summary
  # ============================================
  - id: 'Destroy Summary'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        DESTROY_STATUS="unknown"
        if [ -f /workspace/destroy_status.txt ]; then
            DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        fi
        
        echo "========================================"
        if [ "$$DESTROY_STATUS" = "success" ]; then
            log "🎉 DESTROY COMPLETED SUCCESSFULLY"
        elif [ "$$DESTROY_STATUS" = "skipped" ]; then
            log "ℹ️  DESTROY SKIPPED (NO RESOURCES)"
        else
            log "⚠️  DESTROY COMPLETED WITH WARNINGS"
        fi
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Build ID: ${BUILD_ID}"
        echo "Completed: $$(date)"
        echo "========================================"

  # ============================================
  # CLEANUP: Release Lock
  # ============================================
  - id: 'Release Destroy Lock (Cleanup)'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    waitFor: ['-']
    args:
      - '-c'
      - |
        set +e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 CLEANUP: Releasing lock"
        
        if [ -f /workspace/lock_path.txt ]; then
            LOCK_PATH=$$(cat /workspace/lock_path.txt)
            
            if gsutil cp "$$LOCK_PATH" /tmp/lock.json 2>/dev/null; then
                LOCK_BUILD_ID=$$(cat /tmp/lock.json | grep -o '"build_id":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
                
                if [ "$$LOCK_BUILD_ID" = "${BUILD_ID}" ]; then
                    gsutil rm "$$LOCK_PATH" 2>/dev/null && log "✅ Lock released"
                fi
            fi
        fi
        
        exit 0

# ============================================
# Secret Configuration
# ============================================
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
      env: 'GIT_TOKEN'

# ============================================
# Build Options
# ============================================
options:
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

# ============================================
# Substitution Variables
# ============================================
substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "none"
  _MODULE_GIT_REPO_URL: ""
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"
  _TRIGGERED_BY: "manual"

# ============================================
# Timeout
# ============================================
timeout: 7200s
