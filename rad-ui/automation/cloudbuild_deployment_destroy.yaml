steps:
  # ============================================
  # STEP 0: Validate Destroy Prerequisites
  # ============================================
  - id: 'Validate Destroy Prerequisites'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔍 VALIDATING DESTROY PREREQUISITES"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Validating destroy prerequisites..."
        
        # Check required substitution variables
        MISSING_VARS=0
        
        if [ "${_MODULE_NAME}" = "unknown" ] || [ -z "${_MODULE_NAME}" ]; then
            log "❌ ERROR: _MODULE_NAME not set"
            MISSING_VARS=1
        fi
        
        if [ "${_DEPLOYMENT_ID}" = "none" ] || [ -z "${_DEPLOYMENT_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_ID not set"
            MISSING_VARS=1
        fi
        
        if [ -z "${_DEPLOYMENT_BUCKET_ID}" ]; then
            log "❌ ERROR: _DEPLOYMENT_BUCKET_ID not set"
            MISSING_VARS=1
        fi
        
        if [ $$MISSING_VARS -eq 1 ]; then
            log "❌ ERROR: Required substitution variables missing"
            exit 1
        fi
        
        # Verify bucket exists
        log "🔍 Verifying bucket accessibility..."
        if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}" > /dev/null 2>&1; then
            log "✅ Deployment bucket accessible"
        else
            log "❌ ERROR: Cannot access deployment bucket"
            exit 1
        fi
        
        # Check if deployment exists
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"
        
        log "🔍 Checking deployment existence..."
        if gsutil ls "$$DEPLOYMENT_PATH/" > /dev/null 2>&1; then
            log "✅ Deployment found"
            echo "exists" > /workspace/deployment_exists.txt
            
            # Check for archives
            ARCHIVE_FOUND=false
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}.tar.gz" > /dev/null 2>&1; then
                log "✅ Standard archive found"
                ARCHIVE_FOUND=true
            fi
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}-final-*.tar.gz" > /dev/null 2>&1; then
                log "✅ Final archives found"
                ARCHIVE_FOUND=true
            fi
            
            if gsutil ls "$$DEPLOYMENT_PATH/files/${_MODULE_NAME}-initial*.tar.gz" > /dev/null 2>&1; then
                log "✅ Initial archives found"
                ARCHIVE_FOUND=true
            fi
            
            if [ "$$ARCHIVE_FOUND" = true ]; then
                echo "archive_exists" > /workspace/archive_status.txt
            else
                log "⚠️  No archives found - will try repository fallback"
                echo "archive_missing" > /workspace/archive_status.txt
            fi
            
            # Extract repository info for fallback
            if gsutil cat "$$DEPLOYMENT_PATH/files/deployment_complete.json" > /tmp/deployment_info.json 2>/dev/null; then
                # Install jq if not available
                if ! command -v jq >/dev/null 2>&1; then
                    apk add --no-cache jq 2>/dev/null || log "⚠️  jq not available"
                fi
                
                if command -v jq >/dev/null 2>&1; then
                    jq -r '.repository_type // "unknown"' /tmp/deployment_info.json > /workspace/original_repo_type.txt 2>/dev/null || echo "unknown" > /workspace/original_repo_type.txt
                    jq -r '.repository_url // "none"' /tmp/deployment_info.json > /workspace/original_repo_url.txt 2>/dev/null || echo "none" > /workspace/original_repo_url.txt
                    jq -r '.partner_repo // "none"' /tmp/deployment_info.json > /workspace/original_partner_repo.txt 2>/dev/null || echo "none" > /workspace/original_partner_repo.txt
                    jq -r '.platform_repo // "none"' /tmp/deployment_info.json > /workspace/original_platform_repo.txt 2>/dev/null || echo "none" > /workspace/original_platform_repo.txt
                    
                    log "📦 Original repository info saved for fallback"
                fi
            fi
        else
            log "⚠️  Deployment not found"
            echo "not_exists" > /workspace/deployment_exists.txt
            exit 1
        fi
        
        log "✅ Prerequisites validated"

  # ============================================
  # STEP 1: Acquire Destroy Lock
  # ============================================
  - id: 'Acquire Destroy Lock'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🔒 ACQUIRING DESTROY LOCK"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "⚠️  WARNING: This will DESTROY infrastructure!"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
        LOCK_FILE="/tmp/lock.json"
        
        cat > $$LOCK_FILE <<EOF
        {
          "build_id": "${BUILD_ID}",
          "operation": "destroy",
          "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "locked_by": "${_TRIGGERED_BY:-manual}",
          "project_id": "${PROJECT_ID}",
          "module": "${_MODULE_NAME}",
          "deployment_id": "${_DEPLOYMENT_ID}"
        }
        EOF
        
        MAX_WAIT=300
        WAIT_TIME=0
        ACQUIRED=false
        
        while [ $$WAIT_TIME -lt $$MAX_WAIT ]; do
            if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>/dev/null; then
                log "✅ Lock acquired"
                ACQUIRED=true
                break
            else
                log "⏳ Lock exists, waiting..."
                sleep 10
                WAIT_TIME=$$((WAIT_TIME + 10))
            fi
        done
        
        if [ "$$ACQUIRED" = false ]; then
            log "❌ ERROR: Could not acquire lock after $$MAX_WAIT seconds"
            exit 1
        fi
        
        echo "$$LOCK_PATH" > /workspace/lock_path.txt

  # ============================================
  # STEP 2A: Download from GCS (ENHANCED)
  # ============================================
  - id: 'Download Deployment Files from GCS'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📦 Downloading deployment files from GCS..."
        
        mkdir -p /workspace/modules/${_MODULE_NAME}
        cd /workspace/modules/${_MODULE_NAME}
        
        FILES_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files"
        
        log "📍 Files path: $$FILES_PATH"
        
        # ========================================
        # PART 1: Download Archives (Module Code)
        # ========================================
        log "🔄 Part 1: Attempting to download module archives..."
        
        ARCHIVE_DOWNLOADED=false
        
        # Try standard archive
        log "   Trying: ${_MODULE_NAME}.tar.gz"
        if gsutil cp "$$FILES_PATH/${_MODULE_NAME}.tar.gz" ./${_MODULE_NAME}.tar.gz 2>/dev/null; then
            log "✅ Downloaded standard archive"
            ARCHIVE_DOWNLOADED=true
            echo "${_MODULE_NAME}.tar.gz" > /workspace/archive_file.txt
            echo "gcs" > /workspace/archive_source.txt
        fi
        
        # Try timestamped final archives
        if [ "$$ARCHIVE_DOWNLOADED" = false ]; then
            log "   Trying: ${_MODULE_NAME}-final-*.tar.gz"
            LATEST_FINAL=$$(gsutil ls "$$FILES_PATH/${_MODULE_NAME}-final-*.tar.gz" 2>/dev/null | sort -r | head -n 1 || echo "")
            
            if [ -n "$$LATEST_FINAL" ]; then
                ARCHIVE_NAME=$$(basename "$$LATEST_FINAL")
                log "   Found: $$ARCHIVE_NAME"
                if gsutil cp "$$LATEST_FINAL" ./$$ARCHIVE_NAME 2>/dev/null; then
                    log "✅ Downloaded final archive"
                    ARCHIVE_DOWNLOADED=true
                    echo "$$ARCHIVE_NAME" > /workspace/archive_file.txt
                    echo "gcs" > /workspace/archive_source.txt
                fi
            fi
        fi
        
        # Try initial archives
        if [ "$$ARCHIVE_DOWNLOADED" = false ]; then
            log "   Trying: ${_MODULE_NAME}-initial*.tar.gz"
            LATEST_INITIAL=$$(gsutil ls "$$FILES_PATH/${_MODULE_NAME}-initial*.tar.gz" 2>/dev/null | sort -r | head -n 1 || echo "")
            
            if [ -n "$$LATEST_INITIAL" ]; then
                ARCHIVE_NAME=$$(basename "$$LATEST_INITIAL")
                log "   Found: $$ARCHIVE_NAME"
                if gsutil cp "$$LATEST_INITIAL" ./$$ARCHIVE_NAME 2>/dev/null; then
                    log "✅ Downloaded initial archive"
                    ARCHIVE_DOWNLOADED=true
                    echo "$$ARCHIVE_NAME" > /workspace/archive_file.txt
                    echo "gcs" > /workspace/archive_source.txt
                fi
            fi
        fi
        
        if [ "$$ARCHIVE_DOWNLOADED" = false ]; then
            log "⚠️  No module archives found in GCS"
        fi
        
        # ========================================
        # PART 2: Always Download Configuration Files
        # ========================================
        log "🔄 Part 2: Downloading deployment-specific configuration..."
        
        CONFIG_DOWNLOADED=false
        
        # Download backend.tf (CRITICAL for state access)
        log "   Downloading: backend.tf"
        if gsutil cp "$$FILES_PATH/backend.tf" ./backend.tf 2>/dev/null; then
            log "✅ backend.tf downloaded"
            CONFIG_DOWNLOADED=true
            
            log "📄 Backend configuration:"
            cat backend.tf | sed 's/^/   /'
        else
            log "⚠️  backend.tf not found in GCS"
            log "   Will create default backend configuration"
            
            # Create default backend.tf
            cat > backend.tf <<EOF
        terraform {
          backend "gcs" {
            bucket = "${_DEPLOYMENT_BUCKET_ID}"
            prefix = "deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/state"
          }
        }
        EOF
            log "✅ Created default backend.tf"
            CONFIG_DOWNLOADED=true
        fi
        
        # Download terraform.tfvars.json (OPTIONAL for destroy)
        log "   Downloading: terraform.tfvars.json"
        if gsutil cp "$$FILES_PATH/terraform.tfvars.json" ./terraform.tfvars.json 2>/dev/null; then
            log "✅ terraform.tfvars.json downloaded"
            CONFIG_DOWNLOADED=true
        else
            log "ℹ️  terraform.tfvars.json not found (not required for destroy)"
        fi
        
        # ========================================
        # PART 3: Determine Overall Status
        # ========================================
        log "📊 Download summary:"
        log "   Archive downloaded: $$ARCHIVE_DOWNLOADED"
        log "   Config downloaded: $$CONFIG_DOWNLOADED"
        
        if [ "$$ARCHIVE_DOWNLOADED" = true ]; then
            echo "success" > /workspace/gcs_download_status.txt
            log "✅ GCS download successful (archive + config)"
        elif [ "$$CONFIG_DOWNLOADED" = true ]; then
            echo "partial" > /workspace/gcs_download_status.txt
            log "⚠️  Partial GCS download (config only, no archive)"
            log "   Will need repository fallback for module code"
        else
            echo "failed" > /workspace/gcs_download_status.txt
            log "⚠️  GCS download failed completely"
            log "   Will try repository fallback"
        fi

  # ============================================
  # STEP 2B: Repository Fallback (if needed)
  # ============================================
  - id: 'Repository Fallback'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    secretEnv: ['GIT_TOKEN']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        # Check if GCS download succeeded
        GCS_STATUS="failed"
        if [ -f /workspace/gcs_download_status.txt ]; then
            GCS_STATUS=$$(cat /workspace/gcs_download_status.txt)
        fi
        
        if [ "$$GCS_STATUS" = "success" ]; then
            log "ℹ️  GCS download succeeded - skipping repository fallback"
            exit 0
        fi
        
        log "🔄 Repository fallback needed (GCS status: $$GCS_STATUS)"
        
        cd /workspace/modules/${_MODULE_NAME}
        
        # ========================================
        # Determine repository to use
        # ========================================
        REPO_URL=""
        REPO_TYPE="none"
        
        # Priority 1: Explicitly provided partner repository
        if [ -n "${_MODULE_GIT_REPO_URL}" ] && [ "${_MODULE_GIT_REPO_URL}" != "" ] && [ "${_MODULE_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_MODULE_GIT_REPO_URL}"
            REPO_TYPE="partner"
            log "📦 Using provided PARTNER repository"
        # Priority 2: Explicitly provided platform repository
        elif [ -n "${_GIT_REPO_URL}" ] && [ "${_GIT_REPO_URL}" != "" ] && [ "${_GIT_REPO_URL}" != "none" ]; then
            REPO_URL="${_GIT_REPO_URL}"
            REPO_TYPE="platform"
            log "📦 Using provided PLATFORM repository"
        # Priority 3: Original deployment repository
        elif [ -f /workspace/original_repo_url.txt ]; then
            ORIG_URL=$$(cat /workspace/original_repo_url.txt)
            if [ "$$ORIG_URL" != "none" ] && [ "$$ORIG_URL" != "N/A" ] && [ -n "$$ORIG_URL" ]; then
                REPO_URL="$$ORIG_URL"
                REPO_TYPE=$$(cat /workspace/original_repo_type.txt 2>/dev/null || echo "unknown")
                log "📦 Using ORIGINAL deployment repository"
            fi
        fi
        
        if [ -z "$$REPO_URL" ] || [ "$$REPO_URL" = "none" ]; then
            log "❌ ERROR: No repository configured for fallback"
            log ""
            log "📋 Cannot proceed without module code"
            log "   Options:"
            log "   1. Provide _MODULE_GIT_REPO_URL (partner repository)"
            log "   2. Provide _GIT_REPO_URL (platform repository)"
            log "   3. Restore deployment archive to GCS"
            exit 1
        fi
        
        log "   Repository: $$REPO_URL"
        log "   Type: $$REPO_TYPE"
        
        # Verify Git token
        if [ -z "$$GIT_TOKEN" ]; then
            log "❌ ERROR: Git token not available"
            log "   Secret: ${_GITHUB_TOKEN_SECRET_NAME}"
            log "   Ensure the secret exists and CloudBuild has access"
            exit 1
        fi
        
        # ========================================
        # Clone repository
        # ========================================
        log "📥 Cloning repository..."
        
        if timeout 300 git clone "https://$$GIT_TOKEN@github.com/$$REPO_URL.git" /tmp/repo 2>&1; then
            log "✅ Repository cloned successfully"
            
            # Copy module files
            if [ -d "/tmp/repo/modules/${_MODULE_NAME}" ]; then
                log "📂 Copying module files..."
                cp -r /tmp/repo/modules/${_MODULE_NAME}/* . 2>/dev/null || cp -r /tmp/repo/modules/${_MODULE_NAME}/. .
                log "✅ Module files copied from repository"
                
                # Update status
                echo "repository" > /workspace/archive_source.txt
                echo "from-repo" > /workspace/archive_file.txt
                
                log "⚠️  WARNING: Using fresh repository code"
                log "   This may not reflect the exact deployed state"
            else
                log "❌ ERROR: Module not found in repository"
                log "   Expected path: /tmp/repo/modules/${_MODULE_NAME}"
                log "   Available modules:"
                ls -la /tmp/repo/modules/ 2>/dev/null | sed 's/^/   /' || log "   No modules directory found"
                exit 1
            fi
            
            # Cleanup
            rm -rf /tmp/repo
            
            # ========================================
            # Ensure configuration files exist
            # ========================================
            log "🔍 Verifying configuration files..."
            
            # Check if backend.tf exists (should have been downloaded in Step 2A)
            if [ ! -f "backend.tf" ]; then
                log "⚠️  backend.tf missing - creating default"
                
                cat > backend.tf <<EOF
        terraform {
          backend "gcs" {
            bucket = "${_DEPLOYMENT_BUCKET_ID}"
            prefix = "deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/state"
          }
        }
        EOF
                log "✅ Created default backend.tf"
            else
                log "✅ backend.tf already exists"
            fi
            
            log "✅ Repository fallback completed successfully"
        else
            log "❌ ERROR: Failed to clone repository"
            log "   Repository: $$REPO_URL"
            log "   Type: $$REPO_TYPE"
            log ""
            log "   Possible issues:"
            log "   • Invalid repository URL"
            log "   • Access token expired or lacks permissions"
            log "   • Repository is private"
            log "   • Network timeout"
            exit 1
        fi

  # ============================================
  # STEP 2C: Extract and Verify Files
  # ============================================
  - id: 'Extract and Verify Files'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📂 Extracting and verifying files..."
        
        cd /workspace/modules/${_MODULE_NAME}
        
        # Check archive source
        ARCHIVE_SOURCE="gcs"
        if [ -f /workspace/archive_source.txt ]; then
            ARCHIVE_SOURCE=$$(cat /workspace/archive_source.txt)
        fi
        
        log "📦 Archive source: $$ARCHIVE_SOURCE"
        
        # ========================================
        # Extract if from GCS archive
        # ========================================
        if [ "$$ARCHIVE_SOURCE" = "gcs" ]; then
            ARCHIVE_FILE=$$(cat /workspace/archive_file.txt 2>/dev/null || echo "")
            
            if [ -n "$$ARCHIVE_FILE" ] && [ -f "$$ARCHIVE_FILE" ]; then
                log "🔍 Verifying archive: $$ARCHIVE_FILE"
                
                # Verify archive integrity
                if tar -tzf "$$ARCHIVE_FILE" > /tmp/archive_contents.txt 2>&1; then
                    FILE_COUNT=$$(cat /tmp/archive_contents.txt | wc -l)
                    log "✅ Archive is valid ($$FILE_COUNT entries)"
                    
                    # Extract
                    log "📂 Extracting archive..."
                    if tar -xzf "$$ARCHIVE_FILE" 2>&1 | tee /tmp/extract_output.txt; then
                        log "✅ Files extracted successfully"
                        
                        # Show warnings if any
                        if [ -s /tmp/extract_output.txt ]; then
                            log "⚠️  Extraction warnings:"
                            cat /tmp/extract_output.txt | sed 's/^/   /'
                        fi
                        
                        # Cleanup archive
                        rm -f "$$ARCHIVE_FILE"
                        log "🧹 Cleaned up archive file"
                    else
                        log "❌ ERROR: Extraction failed"
                        cat /tmp/extract_output.txt | sed 's/^/   /'
                        exit 1
                    fi
                else
                    log "❌ ERROR: Archive is corrupted or invalid"
                    log "   Archive: $$ARCHIVE_FILE"
                    log "   Size: $$(du -h $$ARCHIVE_FILE 2>/dev/null | cut -f1 || echo 'unknown')"
                    exit 1
                fi
            else
                log "ℹ️  No archive file to extract"
            fi
        else
            log "ℹ️  Using files from repository - no extraction needed"
        fi
        
        # ========================================
        # Verify critical files
        # ========================================
        log "🔍 Verifying critical files..."
        
        CRITICAL_MISSING=0
        
        # Check for backend.tf (REQUIRED)
        if [ ! -f "backend.tf" ]; then
            log "❌ CRITICAL: backend.tf not found"
            CRITICAL_MISSING=1
        else
            log "✅ backend.tf found"
            log "📄 Backend configuration:"
            cat backend.tf | head -15 | sed 's/^/   /'
        fi
        
        # Check for Terraform files (REQUIRED)
        TF_COUNT=$$(find . -maxdepth 1 -name "*.tf" -type f | wc -l)
        log "📊 Found $$TF_COUNT Terraform files"
        
        if [ $$TF_COUNT -eq 0 ]; then
            log "❌ CRITICAL: No Terraform files found"
            CRITICAL_MISSING=1
        else
            log "📋 Terraform files:"
            find . -maxdepth 1 -name "*.tf" -type f -exec basename {} \; | sort | sed 's/^/   • /'
        fi
        
        # Check for tfvars (OPTIONAL for destroy)
        if [ -f "terraform.tfvars.json" ]; then
            log "✅ terraform.tfvars.json found"
            
            # Validate JSON if jq available
            if command -v jq >/dev/null 2>&1; then
                if jq empty terraform.tfvars.json 2>/dev/null; then
                    VAR_COUNT=$$(jq 'keys | length' terraform.tfvars.json 2>/dev/null || echo "unknown")
                    log "   Variables: $$VAR_COUNT"
                else
                    log "⚠️  terraform.tfvars.json may be invalid JSON"
                fi
            fi
        else
            log "ℹ️  terraform.tfvars.json not found (not required for destroy)"
        fi
        
        # Exit if critical files missing
        if [ $$CRITICAL_MISSING -eq 1 ]; then
            log "❌ ERROR: Critical files missing - cannot proceed with destroy"
            log ""
            log "📋 Current workspace contents:"
            ls -la | sed 's/^/   /'
            log ""
            log "💡 Troubleshooting:"
            log "   • Verify deployment was completed successfully"
            log "   • Check GCS path: gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/files/"
            log "   • Verify repository contains module: modules/${_MODULE_NAME}"
            exit 1
        fi
        
        log "✅ All critical files verified successfully"
        log "📍 Ready for Terraform initialization"

  # ============================================
  # STEP 3: Initialize and Validate State
  # ============================================
  - id: 'Initialize and Validate State'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔧 Initializing Terraform/Tofu for destroy..."
        
        # Show version
        log "📋 Terraform/Tofu version:"
        tofu version || terraform version || log "Could not determine version"
        
        # Initialize
        log "🔄 Running terraform init..."
        if tofu init -reconfigure -no-color 2>&1 | tee /workspace/init_output.txt; then
            log "✅ Initialization successful"
        else
            log "❌ Initialization failed"
            log ""
            log "📋 Initialization output:"
            cat /workspace/init_output.txt | sed 's/^/   /'
            exit 1
        fi
        
        log "🔍 Validating current state..."
        
        mkdir -p /workspace/audit
        
        STATE_EXISTS=false
        RESOURCE_COUNT=0
        
        if tofu show -json > /tmp/current_state.json 2>&1; then
            STATE_EXISTS=true
            
            # Try to count resources using jq
            if command -v jq >/dev/null 2>&1; then
                RESOURCE_COUNT=$$(jq -r '.values.root_module.resources // [] | length' /tmp/current_state.json 2>/dev/null || echo "0")
            else
                # Fallback to state list
                RESOURCE_COUNT=$$(tofu state list 2>/dev/null | wc -l || echo "0")
            fi
            
            log "📊 Found $$RESOURCE_COUNT resources in state"
            
            if [ "$$RESOURCE_COUNT" = "0" ] || [ $$RESOURCE_COUNT -eq 0 ]; then
                log "ℹ️  State is empty - no resources to destroy"
                echo "empty" > /workspace/state_status.txt
            else
                log "✅ State contains resources to destroy"
                echo "has_resources" > /workspace/state_status.txt
                echo "$$RESOURCE_COUNT" > /workspace/resource_count.txt
                
                # Save state for audit
                cp /tmp/current_state.json /workspace/audit/pre_destroy_state.json 2>/dev/null || log "⚠️  Could not save state JSON"
                
                # List resources
                tofu state list 2>/dev/null > /workspace/audit/pre_destroy_resources.txt || log "⚠️  Could not list resources"
                
                log "⚠️  Resources to be DESTROYED:"
                if [ -f /workspace/audit/pre_destroy_resources.txt ]; then
                    cat /workspace/audit/pre_destroy_resources.txt | head -20 | sed 's/^/   • /'
                    
                    TOTAL_RESOURCES=$$(cat /workspace/audit/pre_destroy_resources.txt | wc -l)
                    if [ $$TOTAL_RESOURCES -gt 20 ]; then
                        log "   ... and $$((TOTAL_RESOURCES - 20)) more resources"
                    fi
                fi
            fi
        else
            log "⚠️  No state file found or state is inaccessible"
            log "   This could mean:"
            log "   • Deployment was never applied"
            log "   • State was manually deleted"
            log "   • Backend configuration is incorrect"
            echo "no_state" > /workspace/state_status.txt
        fi
        
        log "✅ State validation completed"
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 4: Create Pre-Destroy Backup
  # ============================================
  - id: 'Create Pre-Destroy Backup'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "💾 Creating pre-destroy backup..."
        
        STATE_STATUS="no_state"
        if [ -f /workspace/state_status.txt ]; then
            STATE_STATUS=$$(cat /workspace/state_status.txt)
        fi
        
        if [ "$$STATE_STATUS" = "no_state" ] || [ "$$STATE_STATUS" = "empty" ]; then
            log "ℹ️  No state to backup - skipping"
            echo "skipped" > /workspace/backup_status.txt
            exit 0
        fi
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}"
        TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
        BACKUP_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/backups/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}-$$TIMESTAMP"
        
        log "📍 Source: $$DEPLOYMENT_PATH"
        log "📍 Backup: $$BACKUP_PATH"
        
        # Calculate size
        SIZE_INFO=$$(gsutil du -sh "$$DEPLOYMENT_PATH/" 2>/dev/null | awk '{print $$1 " " $$2}' || echo "unknown")
        log "📊 Deployment size: $$SIZE_INFO"
        
        # Create backup metadata
        cat > /tmp/backup_metadata.json <<EOF
        {
          "backup_created_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "original_path": "$$DEPLOYMENT_PATH",
          "backup_path": "$$BACKUP_PATH",
          "module": "${_MODULE_NAME}",
          "deployment_id": "${_DEPLOYMENT_ID}",
          "project_id": "${PROJECT_ID}",
          "build_id": "${BUILD_ID}",
          "size": "$$SIZE_INFO",
          "operation": "pre_destroy_backup",
          "triggered_by": "${_TRIGGERED_BY:-manual}"
        }
        EOF
        
        log "📦 Creating backup copy..."
        
        if gsutil -m cp -r "$$DEPLOYMENT_PATH" "$$BACKUP_PATH/" 2>&1 | tee /workspace/backup_output.txt; then
            log "✅ Backup created successfully"
            
            # Upload metadata
            gsutil cp /tmp/backup_metadata.json "$$BACKUP_PATH/backup_metadata.json" 2>/dev/null || log "⚠️  Metadata upload failed"
            
            log "📍 Backup location: $$BACKUP_PATH/"
            echo "success" > /workspace/backup_status.txt
            echo "$$BACKUP_PATH/" > /workspace/backup_location.txt
        else
            log "⚠️  Backup creation failed"
            log "   Continuing with destroy (use caution!)"
            cat /workspace/backup_output.txt | sed 's/^/   /'
            echo "failed" > /workspace/backup_status.txt
        fi

  # ============================================
  # STEP 5: Destroy Infrastructure
  # ============================================
  - id: 'Destroy Infrastructure'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        STATE_STATUS="no_state"
        if [ -f /workspace/state_status.txt ]; then
            STATE_STATUS=$$(cat /workspace/state_status.txt)
        fi
        
        if [ "$$STATE_STATUS" = "no_state" ] || [ "$$STATE_STATUS" = "empty" ]; then
            log "ℹ️  No resources to destroy - skipping"
            echo "skipped" > /workspace/destroy_status.txt
            exit 0
        fi
        
        RESOURCE_COUNT=0
        if [ -f /workspace/resource_count.txt ]; then
            RESOURCE_COUNT=$$(cat /workspace/resource_count.txt)
        fi
        
        echo "========================================"
        log "🔥 DESTROYING INFRASTRUCTURE"
        echo "========================================"
        log "⚠️  WARNING: About to destroy $$RESOURCE_COUNT resources"
        log "   Module: ${_MODULE_NAME}"
        log "   Deployment: ${_DEPLOYMENT_ID}"
        echo "========================================"
        
        log "🔥 Running terraform destroy..."
        
        if tofu destroy -auto-approve -no-color 2>&1 | tee /workspace/destroy_output.txt; then
            log "✅ Destroy completed successfully"
            echo "success" > /workspace/destroy_status.txt
        else
            log "❌ Destroy failed"
            log ""
            log "📋 Destroy output:"
            tail -50 /workspace/destroy_output.txt | sed 's/^/   /'
            echo "failed" > /workspace/destroy_status.txt
            exit 1
        fi
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 6: Verify Destroy
  # ============================================
  - id: 'Verify Destroy'
    name: '${_TERRAFORM_IMAGE_NAME}:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔍 Verifying destroy completion..."
        
        DESTROY_STATUS="unknown"
        if [ -f /workspace/destroy_status.txt ]; then
            DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        fi
        
        if [ "$$DESTROY_STATUS" = "skipped" ]; then
            log "ℹ️  Destroy was skipped - no verification needed"
            echo "complete" > /workspace/destroy_verification.txt
            exit 0
        fi
        
        # Check remaining resources
        REMAINING=$$(tofu state list 2>/dev/null | wc -l || echo "0")
        
        if [ $$REMAINING -eq 0 ]; then
            log "✅ All resources destroyed successfully"
            log "   State is now empty"
            echo "complete" > /workspace/destroy_verification.txt
        else
            log "⚠️  WARNING: $$REMAINING resources remain in state"
            log ""
            log "📋 Remaining resources:"
            tofu state list 2>/dev/null | sed 's/^/   • /' || log "   Could not list resources"
            log ""
            log "💡 This could indicate:"
            log "   • Resources that failed to destroy"
            log "   • Resources with deletion protection"
            log "   • Manual intervention required"
            echo "incomplete" > /workspace/destroy_verification.txt
        fi
        
        # Save post-destroy state for audit
        mkdir -p /workspace/audit
        tofu state list 2>/dev/null > /workspace/audit/post_destroy_resources.txt || echo "No resources" > /workspace/audit/post_destroy_resources.txt
        tofu show -json 2>/dev/null > /workspace/audit/post_destroy_state.json || echo "{}" > /workspace/audit/post_destroy_state.json
    dir: /workspace/modules/${_MODULE_NAME}

  # ============================================
  # STEP 7: Upload Audit Files
  # ============================================
  - id: 'Upload Audit Files'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📤 Uploading audit files..."
        
        AUDIT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit"
        
        log "📍 Audit path: $$AUDIT_PATH"
        
        # Upload audit files
        UPLOADED=0
        if [ -d /workspace/audit ]; then
            for file in /workspace/audit/*; do
                if [ -f "$$file" ]; then
                    FILENAME=$$(basename "$$file")
                    if gsutil cp "$$file" "$$AUDIT_PATH/$$FILENAME" 2>/dev/null; then
                        log "✅ Uploaded: $$FILENAME"
                        UPLOADED=$$((UPLOADED + 1))
                    else
                        log "⚠️  Failed to upload: $$FILENAME"
                    fi
                fi
            done
        fi
        
        # Upload destroy output
        if [ -f /workspace/destroy_output.txt ]; then
            gsutil cp /workspace/destroy_output.txt "$$AUDIT_PATH/destroy_output.txt" 2>/dev/null && log "✅ Uploaded destroy output"
        fi
        
        # Create destroy completion marker
        DESTROY_STATUS="unknown"
        DESTROY_VERIFICATION="unknown"
        BACKUP_STATUS="unknown"
        BACKUP_LOCATION=""
        
        [ -f /workspace/destroy_status.txt ] && DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        [ -f /workspace/destroy_verification.txt ] && DESTROY_VERIFICATION=$$(cat /workspace/destroy_verification.txt)
        [ -f /workspace/backup_status.txt ] && BACKUP_STATUS=$$(cat /workspace/backup_status.txt)
        [ -f /workspace/backup_location.txt ] && BACKUP_LOCATION=$$(cat /workspace/backup_location.txt)
        
        cat > /tmp/destroy_complete.json <<EOF
        {
          "destroyed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "deployment_id": "${_DEPLOYMENT_ID}",
          "module": "${_MODULE_NAME}",
          "project_id": "${PROJECT_ID}",
          "build_id": "${BUILD_ID}",
          "operation": "destroy",
          "status": "$$DESTROY_STATUS",
          "verification": "$$DESTROY_VERIFICATION",
          "backup_status": "$$BACKUP_STATUS",
          "backup_location": "$$BACKUP_LOCATION",
          "triggered_by": "${_TRIGGERED_BY:-manual}"
        }
        EOF
        
        if gsutil cp /tmp/destroy_complete.json "$$AUDIT_PATH/destroy_complete.json" 2>/dev/null; then
            log "✅ Uploaded completion marker"
            UPLOADED=$$((UPLOADED + 1))
        fi
        
        log "📊 Uploaded $$UPLOADED audit files"

  # ============================================
  # STEP 8: Cleanup Deployment Folder
  # ============================================
  - id: 'Cleanup Deployment Folder'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set +e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 Cleaning up deployment folder..."
        
        DESTROY_STATUS="failed"
        if [ -f /workspace/destroy_status.txt ]; then
            DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        fi
        
        DESTROY_VERIFICATION="incomplete"
        if [ -f /workspace/destroy_verification.txt ]; then
            DESTROY_VERIFICATION=$$(cat /workspace/destroy_verification.txt)
        fi
        
        # Only cleanup if destroy was successful and complete
        if [ "$$DESTROY_STATUS" != "success" ] && [ "$$DESTROY_STATUS" != "skipped" ]; then
            log "⚠️  Skipping cleanup - destroy did not complete successfully"
            log "   Status: $$DESTROY_STATUS"
            exit 0
        fi
        
        if [ "$$DESTROY_VERIFICATION" = "incomplete" ]; then
            log "⚠️  Skipping cleanup - resources remain in state"
            log "   Manual cleanup may be required"
            exit 0
        fi
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
        
        log "🗑️  Removing deployment folder..."
        log "   Path: $$DEPLOYMENT_PATH"
        
        if gsutil -m rm -r "$$DEPLOYMENT_PATH" 2>&1 | tee /workspace/cleanup_output.txt; then
            log "✅ Deployment folder removed successfully"
        else
            log "⚠️  Failed to remove deployment folder"
            log "   You may need to manually delete:"
            log "   gsutil -m rm -r $$DEPLOYMENT_PATH"
            cat /workspace/cleanup_output.txt | sed 's/^/   /'
        fi

  # ============================================
  # STEP 9: Destroy Summary
  # ============================================
  - id: 'Destroy Summary'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        DESTROY_STATUS="unknown"
        DESTROY_VERIFICATION="unknown"
        BACKUP_STATUS="unknown"
        BACKUP_LOCATION=""
        
        [ -f /workspace/destroy_status.txt ] && DESTROY_STATUS=$$(cat /workspace/destroy_status.txt)
        [ -f /workspace/destroy_verification.txt ] && DESTROY_VERIFICATION=$$(cat /workspace/destroy_verification.txt)
        [ -f /workspace/backup_status.txt ] && BACKUP_STATUS=$$(cat /workspace/backup_status.txt)
        [ -f /workspace/backup_location.txt ] && BACKUP_LOCATION=$$(cat /workspace/backup_location.txt)
        
        echo "========================================"
        if [ "$$DESTROY_STATUS" = "success" ] && [ "$$DESTROY_VERIFICATION" = "complete" ]; then
            log "🎉 DESTROY COMPLETED SUCCESSFULLY"
        elif [ "$$DESTROY_STATUS" = "skipped" ]; then
            log "ℹ️  DESTROY SKIPPED (NO RESOURCES)"
        else
            log "⚠️  DESTROY COMPLETED WITH WARNINGS"
        fi
        echo "========================================"
        echo "Deployment Details:"
        echo "  • Module: ${_MODULE_NAME}"
        echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
        echo "  • Project: ${PROJECT_ID}"
        echo "  • Build ID: ${BUILD_ID}"
        echo "  • Completed: $$(date)"
        echo "========================================"
        echo "Operation Status:"
        echo "  • Destroy: $$DESTROY_STATUS"
        echo "  • Verification: $$DESTROY_VERIFICATION"
        echo "  • Backup: $$BACKUP_STATUS"
        
        if [ -n "$$BACKUP_LOCATION" ]; then
            echo "  • Backup location: $$BACKUP_LOCATION"
        fi
        
        echo "========================================"
        echo "📁 Audit Files:"
        echo "  • Path: gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit/"
        echo "========================================"
        
        if [ "$$DESTROY_VERIFICATION" = "incomplete" ]; then
            echo "⚠️  WARNING: Some resources may remain"
            echo "   Review audit files for details"
            echo "   Manual cleanup may be required"
            echo "========================================"
        fi
        
        log "✅ Destroy operation complete"

  # ============================================
  # CLEANUP: Release Lock
  # ============================================
  - id: 'Release Destroy Lock (Cleanup)'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    waitFor: ['-']
    args:
      - '-c'
      - |
        set +e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🧹 CLEANUP: Releasing destroy lock"
        
        if [ -f /workspace/lock_path.txt ]; then
            LOCK_PATH=$$(cat /workspace/lock_path.txt)
            
            if gsutil cp "$$LOCK_PATH" /tmp/lock.json 2>/dev/null; then
                LOCK_BUILD_ID=$$(cat /tmp/lock.json | grep -o '"build_id":"[^"]*"' | cut -d'"' -f4 2>/dev/null)
                
                if [ "$$LOCK_BUILD_ID" = "${BUILD_ID}" ]; then
                    if gsutil rm "$$LOCK_PATH" 2>/dev/null; then
                        log "✅ Lock released successfully"
                    else
                        log "⚠️  Failed to release lock"
                    fi
                else
                    log "⚠️  Lock owned by different build: $$LOCK_BUILD_ID"
                fi
            else
                log "ℹ️  Lock already released or not found"
            fi
        else
            log "ℹ️  No lock path found"
        fi
        
        exit 0

# ============================================
# Secret Configuration
# ============================================
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_GITHUB_TOKEN_SECRET_NAME}/versions/latest
      env: 'GIT_TOKEN'

# ============================================
# Build Options
# ============================================
options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

# ============================================
# Substitution Variables
# ============================================
substitutions:
  _DEPLOYMENT_ID: "none"
  _MODULE_NAME: "unknown"
  _DEPLOYMENT_BUCKET_ID: "rad-deployments-2b65"
  _TERRAFORM_IMAGE_NAME: "us-central1-docker.pkg.dev/tec-rad-ui-2b65/opentofu-images/opentofu"
  _GIT_REPO_URL: "none"                    # Platform repository (fallback)
  _MODULE_GIT_REPO_URL: ""                 # Partner repository (fallback)
  _GITHUB_TOKEN_SECRET_NAME: "git-access-token"
  _TRIGGERED_BY: "manual"

# ============================================
# Logs Configuration
# ============================================
logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/destroy/${_MODULE_NAME}/${_DEPLOYMENT_ID}'

# ============================================
# Timeout
# ============================================
timeout: 7200s

