          "deployment_existed": "$$DEPLOYMENT_EXISTS",
          "folder_size": "$$FOLDER_SIZE",
          "completed_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "triggered_by": "${_TRIGGERED_BY:-manual}",
          "repository_info": {
            "original_type": "$$ORIGINAL_REPO_TYPE",
            "original_url": "$$ORIGINAL_REPO_URL",
            "original_partner_repo": "$$ORIGINAL_PARTNER_REPO",
            "original_platform_repo": "$$ORIGINAL_PLATFORM_REPO",
            "purge_git_repo": "${_GIT_REPO_URL:-none}",
            "purge_module_git_repo": "${_MODULE_GIT_REPO_URL:-none}"
          }
        }
        EOF
        
        log "📋 Final build metadata:"
        cat /tmp/final_build_metadata.json
        
        # Upload metadata to audit location
        METADATA_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/build-logs/purge/${_MODULE_NAME}/${_DEPLOYMENT_ID}/audit/final_build_metadata.json"
        
        if gsutil -h "Content-Type:application/json" \
                  cp /tmp/final_build_metadata.json "$$METADATA_PATH" 2>/dev/null; then
            log "✅ Final build metadata uploaded"
        else
