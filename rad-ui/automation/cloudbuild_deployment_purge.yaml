steps:
- id: 'Delete Config Files from GCS bucket and Remove Bucket'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 Starting GCS cleanup for deployment: ${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: gs://${_DEPLOYMENT_BUCKET_ID}"
    echo "Path: deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "----------------------------------------"
    
    # Clean module workspace first
    echo "🧹 Cleaning module workspace..."
    rm -rvf * || echo "Module workspace already clean"
    
    # Check if GCS path exists before attempting deletion
    echo "🔍 Checking if GCS deployment files exist..."
    if gsutil ls "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/" 2>/dev/null; then
        echo "📁 Found deployment files, proceeding with deletion..."
        gsutil -m rm -r "gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/"
        echo "✅ GCS deployment files deleted successfully"
    else
        echo "ℹ️  No GCS deployment files found at specified path (may already be deleted)"
    fi
  
    echo "🎯 GCS cleanup completed"
  dir: /workspace/modules/${_MODULE_NAME}

- id: 'Cleanup Verification & Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🔍 Verifying cleanup completion..."
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Module Name: ${_MODULE_NAME}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • GCS Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "========================================"
    
    # Verify GCS cleanup
    echo "🔍 Final GCS verification..."
    if gsutil ls gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/ ; then
        echo "⚠️  Warning: Some GCS files may still exist"
        gsutil ls gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/ || true
    else
        echo "✅ GCS cleanup verified - no files found"
    fi
    
    echo "========================================"
    echo "🎉 Deployment purge operation completed!"
    echo "   Deployment '${_MODULE_NAME}_${_DEPLOYMENT_ID}' cleanup finished"
    echo "========================================"
  dir: /workspace/modules/${_MODULE_NAME}

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true

substitutions:
  _DEPLOYMENT_ID: "none"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/logs'
timeout: 1800s  # 30 minutes should be plenty for cleanup

