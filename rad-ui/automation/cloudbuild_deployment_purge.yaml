steps:
  # ============================================
  # STEP 1: Acquire Lock
  # ============================================
  - id: 'Acquire Purge Lock'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "🔒 Acquiring purge lock..."
        
        LOCK_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/lock"
        LOCK_FILE="/tmp/lock.json"
        
        # Create lock file
        cat > $$LOCK_FILE <<EOF
        {
          "build_id": "${BUILD_ID}",
          "operation": "purge",
          "locked_at": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "locked_by": "${_TRIGGERED_BY:-manual}"
        }
        EOF
        
        # Try to create lock
        if gsutil cp -n $$LOCK_FILE "$$LOCK_PATH" 2>&1; then
            log "✅ Lock acquired successfully"
        else
            log "❌ ERROR: Deployment is locked by another operation"
            
            if gsutil cat "$$LOCK_PATH" 2>/dev/null; then
                log "   Check if the other operation is still running"
            fi
            
            exit 1
        fi

  # ============================================
  # STEP 2: Create Pre-Purge Audit
  # ============================================
  - id: 'Create Pre-Purge Audit'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }
        
        log "📝 Creating pre-purge audit..."
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
        
        mkdir -p /tmp/audit
        
        # Calculate folder size
        if gsutil ls "$$DEPLOYMENT_PATH" > /dev/null 2>&1; then
            FOLDER_SIZE=$$(gsutil du -sh "$$DEPLOYMENT_PATH" 2>/dev/null | awk '{print $$1 " " $$2}' || echo "unknown")
            FILE_COUNT=$$(gsutil ls -r "$$DEPLOYMENT_PATH" 2>/dev/null | grep -v ':$$' | wc -l || echo "0")
            
            log "📊 Folder size: $$FOLDER_SIZE"
            log "📊 File count: $$FILE_COUNT"
            
            # List all files
            gsutil ls -r "$$DEPLOYMENT_PATH" > /tmp/audit/file_list.txt 2>/dev/null || echo "Unable to list files" > /tmp/audit/file_list.txt
        else
            FOLDER_SIZE="0"
            FILE_COUNT="0"
            log "ℹ️  Deployment folder not found"
            echo "Deployment folder not found" > /tmp/audit/file_list.txt
        fi
        
        # Create audit record
        cat > /tmp/audit/pre_purge_audit.json <<EOF
        {
          "module": "${_MODULE_NAME}",
          "deployment_id": "${_DEPLOYMENT_ID}",
          "project_id": "${PROJECT_ID}",
          "build_id": "${BUILD_ID}",
          "audit_time": "$$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "folder_size": "$$FOLDER_SIZE",
          "file_count": $$FILE_COUNT,
          "deployment_path": "$$DEPLOYMENT_PATH"
        }
        EOF
        
        log "✅ Pre-purge audit created"

  # ============================================
  # STEP 3: Delete Cloud Storage Bucket Content
  # ============================================
  - id: 'Delete Cloud Storage Bucket'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🗑️  CLOUD STORAGE PURGE INITIATED"
        echo "========================================"
        echo "Module: ${_MODULE_NAME}"
        echo "Deployment ID: ${_DEPLOYMENT_ID}"
        echo "Project: ${PROJECT_ID}"
        echo "Bucket: ${_DEPLOYMENT_BUCKET_ID}"
        echo "Timestamp: $$(date)"
        echo "========================================"
        echo "⚠️  WARNING: This will DELETE all deployment files!"
        echo "========================================"
        
        log() {
            echo "[$$(date +'%H:%M:%S')] $$1"
        }

        log "🔍 Checking for deployment folder..."
        
        DEPLOYMENT_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}/${_DEPLOYMENT_ID}/"
        
        if gsutil ls "$$DEPLOYMENT_PATH" > /dev/null 2>&1; then
            log "📁 Found deployment folder: $$DEPLOYMENT_PATH"
            
            # Remove with retry logic
            log "🗑️  Removing deployment folder..."
            
            MAX_RETRIES=3
            RETRY_COUNT=0
            SUCCESS=false
            
            while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
                if gsutil -m rm -r "$$DEPLOYMENT_PATH" 2>&1; then
                    SUCCESS=true
                    break
                else
                    RETRY_COUNT=$$((RETRY_COUNT + 1))
                    if [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; then
                        log "⚠️  Retry $$RETRY_COUNT/$$MAX_RETRIES after 5 seconds..."
                        sleep 5
                    fi
                fi
            done
            
            if [ "$$SUCCESS" = true ]; then
                log "✅ Successfully removed deployment folder from Cloud Storage"
                
                # Verify deletion
                if gsutil ls "$$DEPLOYMENT_PATH" > /dev/null 2>&1; then
                    log "❌ ERROR: Deployment folder still exists after deletion attempt"
                    exit 1
                else
                    log "✅ Verified: Deployment folder has been removed"
                fi
            else
                log "❌ ERROR: Failed to remove deployment folder after $$MAX_RETRIES attempts"
                log "   Path: $$DEPLOYMENT_PATH"
                exit 1
            fi
        else
            log "ℹ️  Deployment folder not found"
            log "   Path: $$DEPLOYMENT_PATH"
            log "✅ No action needed - folder does not exist"
        fi
