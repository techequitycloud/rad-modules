steps:
- id: 'Delete Config Files from GCS bucket'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🚀 Starting GCS cleanup for deployment: ${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "Project: ${PROJECT_ID}"
    echo "Bucket: gs://${_DEPLOYMENT_BUCKET_ID}"
    echo "Path: deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "----------------------------------------"
    
    # Clean module workspace first
    echo "🧹 Cleaning module workspace..."
    rm -rvf * || echo "Module workspace already clean"
    
    # Delete deployment files from GCS
    echo "🗑️  Deleting deployment files from GCS..."
    GCS_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "   Target path: ${GCS_PATH}"
    
    # Simply try to delete - don't check first
    echo "📁 Attempting deletion..."
    set +e  # Disable exit on error temporarily
    gsutil -m rm -r "${GCS_PATH}/**" 2>&1 | tee /tmp/gsutil_output.log
    EXIT_CODE=${PIPESTATUS[0]}
    set -e  # Re-enable exit on error
    
    # Check the result
    if [ $EXIT_CODE -eq 0 ]; then
        echo "✅ GCS deployment files deleted successfully"
    else
        # Check if it's because no files exist
        if grep -q "No URLs matched" /tmp/gsutil_output.log || grep -q "NotFoundException" /tmp/gsutil_output.log; then
            echo "ℹ️  No files found at path (may already be deleted) - this is OK"
        else
            echo "⚠️  Warning: Deletion encountered an issue, but continuing..."
            cat /tmp/gsutil_output.log
        fi
    fi
    
    echo "🎯 GCS cleanup completed"
  dir: /workspace

- id: 'Cleanup Verification & Summary'
  name: '${_TERRAFORM_IMAGE_NAME}:latest'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    
    echo "🔍 Verifying cleanup completion..."
    echo "========================================"
    echo "Deployment Details:"
    echo "  • Deployment ID: ${_DEPLOYMENT_ID}"
    echo "  • Module Name: ${_MODULE_NAME}"
    echo "  • Project: ${PROJECT_ID}"
    echo "  • GCS Bucket: ${_DEPLOYMENT_BUCKET_ID}"
    echo "========================================"
    
    # Verify GCS cleanup
    GCS_PATH="gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}"
    echo "🔍 Final GCS verification..."
    
    set +e
    FILE_COUNT=$(gsutil ls -r "${GCS_PATH}/**" 2>/dev/null | wc -l)
    set -e
    
    if [ "$FILE_COUNT" -gt "0" ]; then
        echo "⚠️  Warning: Some GCS files may still exist ($FILE_COUNT files)"
        gsutil ls -r "${GCS_PATH}/**" 2>/dev/null || true
    else
        echo "✅ GCS cleanup verified - no files found"
    fi
    
    echo "========================================"
    echo "🎉 Deployment purge operation completed!"
    echo "   Deployment '${_MODULE_NAME}_${_DEPLOYMENT_ID}' cleanup finished"
    echo "========================================"
  dir: /workspace

options:
  logging: GCS_ONLY
  logStreamingOption: STREAM_ON
  dynamic_substitutions: true

substitutions:
  _DEPLOYMENT_ID: "none"

logsBucket: 'gs://${_DEPLOYMENT_BUCKET_ID}/deployments/${_MODULE_NAME}_${_DEPLOYMENT_ID}/logs'
timeout: 1800s
