name: Weekly Convention & Doc Audit

# Runs every Sunday at 02:00 UTC. Catches convention and documentation drift that
# accumulates between PRs:
#   - Convention drift across all modules (scripts/check_conventions.py)
#   - CLAUDE.md "Module Families" / README module list vs actual modules/
#   - README Inputs/Outputs tables vs variables.tf/outputs.tf
#   - module_documentation lab-guide URLs and docs/labs/<Module>.md presence
#   - Script/path references in CLAUDE.md, AGENTS.md, README.md, SKILLS.md
#
# Opens a GitHub issue labelled "doc-audit" when problems are found; appends a
# comment if an open one already exists. Manually triggerable via workflow_dispatch.
#
# Prerequisites:
#   - Add ANTHROPIC_API_KEY to the repository secrets
#   - Create a "doc-audit" label (Settings -> Labels)

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doc-audit:
    name: Convention & Doc Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run convention checker (input for the audit)
        run: python3 scripts/check_conventions.py --modules-dir modules/ > /tmp/conventions.txt 2>&1 || true

      - name: Run audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Prompt body lives in a separate file so this YAML never embeds a
          # column-0 heredoc.
          claude --dangerouslySkipPermissions \
            --allowedTools "Read,Grep,Glob,Bash" \
            --output-format text \
            -p "$(cat .github/claude-prompts/weekly-audit.md)" > /tmp/audit.txt 2>&1 \
            || echo "## Issues Found — Claude audit encountered an error; check the workflow logs." > /tmp/audit.txt

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = fs.readFileSync('/tmp/audit.txt', 'utf8').trim();

            if (audit === 'CLEAN') {
              console.log('Audit passed — no convention or documentation drift detected.');
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `Weekly convention/doc audit findings — ${today}`;
            const body = `${audit}\n\n---\n_Generated by ` +
              `[claude-weekly-audit.yml](.github/workflows/claude-weekly-audit.yml) ` +
              `on ${today}_`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'doc-audit',
              state: 'open',
            });

            const existing = issues.find(i => i.title.startsWith('Weekly convention/doc audit'));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `**Re-run on ${today}:**\n\n${audit}`,
              });
              console.log(`Appended to existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['doc-audit'],
              });
              console.log(`Created issue #${issue.number}: ${title}`);
            }
