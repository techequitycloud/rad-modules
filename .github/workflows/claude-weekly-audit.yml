name: Weekly Convention & Doc Audit

# Runs every Sunday at 02:00 UTC. Catches convention and documentation drift that
# accumulates between PRs:
#   - Convention drift across all modules (scripts/check_conventions.py)
#   - CLAUDE.md "Module Families" / README module list vs actual modules/
#   - README Inputs/Outputs tables vs variables.tf/outputs.tf
#   - module_documentation lab-guide URLs and docs/labs/<Module>.md presence
#   - Script/path references in CLAUDE.md, AGENTS.md, README.md, SKILLS.md
#
# Opens a GitHub issue labelled "doc-audit" when problems are found; appends a
# comment if an open one already exists. Manually triggerable via workflow_dispatch.
#
# When scripts/check_conventions.py reports a FAIL (a hard invariant violated on
# main), the issue is ALSO tagged "convention-drift" — applied deterministically
# from the checker output, so it works even if the Claude doc audit is CLEAN or
# ANTHROPIC_API_KEY is unset, and an issue is opened for the FAIL on its own.
# WARN findings (legitimate per-module variation) stay in the audit narrative but
# do not trigger the label.
#
# Prerequisites:
#   - Add ANTHROPIC_API_KEY to the repository secrets
#   - Create the "doc-audit" and "convention-drift" labels (Settings -> Labels)

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doc-audit:
    name: Convention & Doc Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run convention checker (input for the audit)
        run: python3 scripts/check_conventions.py --modules-dir modules/ > /tmp/conventions.txt 2>&1 || true

      - name: Run audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Prompt body lives in a separate file so this YAML never embeds a
          # column-0 heredoc.
          claude --dangerously-skip-permissions \
            --allowedTools "Read,Grep,Glob,Bash" \
            --output-format text \
            -p "$(cat .github/claude-prompts/weekly-audit.md)" > /tmp/audit.txt 2>&1 \
            || echo "## Issues Found — Claude audit encountered an error; check the workflow logs." > /tmp/audit.txt

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = fs.readFileSync('/tmp/audit.txt', 'utf8').trim();

            // Read the deterministic convention-checker output and decide, on its
            // own (independent of Claude), whether convention drift is present.
            let conventions = '';
            try {
              conventions = fs.readFileSync('/tmp/conventions.txt', 'utf8').trim();
            } catch (e) { /* checker step may not have produced output */ }
            // FAIL only — WARN findings are legitimate per-module variation
            // (attached-cluster modules omit outputs.tf, etc.) and persist by
            // design, so they would pin the label on every issue. FAIL = a hard
            // invariant violated on main, which is actionable.
            const hasConventionFindings = /^\s*FAIL\s/m.test(conventions);
            const auditClean = audit === 'CLEAN';

            // Nothing to report only when BOTH the doc audit is clean AND the
            // checker found no drift.
            if (auditClean && !hasConventionFindings) {
              console.log('Audit passed — no convention or documentation drift detected.');
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const title = `Weekly convention/doc audit findings — ${today}`;

            // When Claude reported CLEAN but the checker found drift, surface the
            // checker output directly so the issue is not just the word "CLEAN".
            const reportBody = auditClean
              ? '_Documentation audit: CLEAN._\n\n' +
                '## Convention drift (scripts/check_conventions.py)\n\n' +
                '```\n' + conventions + '\n```'
              : audit;
            const body = `${reportBody}\n\n---\n_Generated by ` +
              `[claude-weekly-audit.yml](.github/workflows/claude-weekly-audit.yml) ` +
              `on ${today}_`;

            const labels = hasConventionFindings
              ? ['doc-audit', 'convention-drift']
              : ['doc-audit'];

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'doc-audit',
              state: 'open',
            });

            const existing = issues.find(i => i.title.startsWith('Weekly convention/doc audit'));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `**Re-run on ${today}:**\n\n${reportBody}`,
              });
              if (hasConventionFindings) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  labels: ['convention-drift'],
                });
              }
              console.log(`Appended to existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              console.log(`Created issue #${issue.number}: ${title}`);
            }
