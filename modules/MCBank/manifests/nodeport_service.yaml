apiVersion: v1
kind: Service
metadata:
  name: bank-of-anthos
  namespace: bank-of-anthos
  annotations:
    cloud.google.com/backend-config: '{"default": "bank-of-anthos"}'
    cloud.google.com/neg: '{"ingress": true}'
  labels:
    app: bank-of-anthos
spec:
  type: NodePort
  selector:
    app: frontend
  sessionAffinity: None
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080