plugins {
	id 'groovy'
	id 'application'
	id 'eclipse'
}

repositories {
	mavenCentral()
}

dependencies {
	implementation dependencies.create(libs.groovy.all.get()) {
		exclude group: 'org.codehaus.groovy', module: 'groovy-test-junit5'
		exclude group: 'org.codehaus.groovy', module: 'groovy-testng'
	}
	implementation libs.servlet.api
	implementation fileTree(dir: 'lib', include: '*.jar', exclude: 'groovy-*.jar')
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(11)
	}
}

sourceSets {
    main {
        groovy {
            srcDir 'src/main/templates'
			srcDir 'src/main/playground'
        }
    }
}

application {
	mainClass = 'org.cyclos.impl.system.RunScript'
}
