steps:
# Build with Kaniko (more reliable than Docker in Cloud Build)
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
    - '--dockerfile=Dockerfile'
    - '--context=dir://django'
    - '--destination=us-central1-docker.pkg.dev/qwiklabs-gcp-03-5421a1d20b10/djangobasic41455684-repo/django:latest'
    - '--destination=us-central1-docker.pkg.dev/qwiklabs-gcp-03-5421a1d20b10/djangobasic41455684-repo/django:latest'

    - '--build-arg=APP_VERSION=latest'

    - '--cache=true'
    - '--cache-ttl=24h'
  timeout: '1800s'

serviceAccount: 'projects/qwiklabs-gcp-03-5421a1d20b10/serviceAccounts/cloudbuild-sa@qwiklabs-gcp-03-5421a1d20b10.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
  # machineType: 'E2_HIGHCPU_8'
  
timeout: '3600s'
