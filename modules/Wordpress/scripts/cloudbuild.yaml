steps:
# Build with Kaniko (more reliable than Docker in Cloud Build)
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
    - '--dockerfile=Dockerfile'
    - '--context=dir://wordpress'
    - '--destination=us-east1-docker.pkg.dev/qwiklabs-gcp-02-30b30b50c2a4/wpbasic3ec468b8-repo/wp:6.8.1'
    - '--destination=us-east1-docker.pkg.dev/qwiklabs-gcp-02-30b30b50c2a4/wpbasic3ec468b8-repo/wp:latest'

    - '--build-arg=APP_SHA=52d5f05c96a9155f78ed84700264307e5dea14b4'

    - '--build-arg=APP_VERSION=6.8.1'

    - '--cache=true'
    - '--cache-ttl=24h'
  timeout: '1800s'

serviceAccount: 'projects/qwiklabs-gcp-02-30b30b50c2a4/serviceAccounts/cloudbuild-sa@qwiklabs-gcp-02-30b30b50c2a4.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
  # machineType: 'E2_HIGHCPU_8'
  
timeout: '3600s'
