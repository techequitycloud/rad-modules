---
gcrKeyPath: /root/bm-gcr.json
sshPrivateKeyPath: /root/.ssh/id_rsa
gkeConnectAgentServiceAccountKeyPath: /root/bm-gcr.json
gkeConnectRegisterServiceAccountKeyPath: /root/bm-gcr.json
cloudOperationsServiceAccountKeyPath: /root/bm-gcr.json
---
apiVersion: v1
kind: Namespace
metadata:
  name: gke-abm-cluster-ns
---
apiVersion: baremetal.cluster.gke.io/v1
kind: Cluster
metadata:
  name: gke-abm-cluster
  namespace: gke-abm-cluster-ns
spec:
  type: hybrid
  anthosBareMetalVersion: 1.14.1
  gkeConnect:
    projectID: qwiklabs-gcp-01-ad8250d6089a
  controlPlane:
    nodePoolSpec:
      clusterName: gke-abm-cluster
      nodes:
      - address: 10.200.0.3
      
  clusterNetwork:
    pods:
      cidrBlocks:
      - 192.168.0.0/16
    services:
      cidrBlocks:
      - 172.26.232.0/24
  loadBalancer:
    mode: bundled
    ports:
      controlPlaneLBPort: 443
    vips:
      controlPlaneVIP: 10.200.0.49
      ingressVIP: 10.200.0.50
    addressPools:
    - name: pool1
      addresses:
      - 10.200.0.50-10.200.0.70
  clusterOperations:
    # might need to be this location
    location: us-central1
    projectID: qwiklabs-gcp-01-ad8250d6089a
  storage:
    lvpNodeMounts:
      path: /mnt/localpv-disk
      storageClassName: node-disk
    lvpShare:
      numPVUnderSharedPath: 5
      path: /mnt/localpv-share
      storageClassName: local-shared
  clusterSecurity:
    authorization:
      clusterAdmin:
        gcpAccounts: []
---
apiVersion: baremetal.cluster.gke.io/v1
kind: NodePool
metadata:
  name: node-pool-1
  namespace: gke-abm-cluster-ns
spec:
  clusterName: gke-abm-cluster
  nodes:
  - address: 10.200.0.4
  
